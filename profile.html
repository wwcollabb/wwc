<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Worldwide Collab</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #8b5cf6;
      --accent: #06b6d4;
      --dark: #0f172a;
      --light: #f8fafc;
      --success: #10b981;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
      --glass: rgba(255, 255, 255, 0.95);
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      min-height: 100vh;
      color: #1e293b;
      padding-top: 80px;
    }

    /* ── Header ── */
    header {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      box-shadow: var(--shadow-sm);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 22px;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .logo img {
      width: 45px;
      height: 45px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s;
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .back-btn:hover {
      background: var(--gradient);
      color: white;
      border-color: transparent;
      transform: translateX(-3px);
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    /* ── Page Layout ── */
    .page-content {
      max-width: 600px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .page-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .page-title h1 {
      font-size: 32px;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .page-title p {
      color: #64748b;
      font-size: 15px;
    }

    /* ── Profile Card ── */
    .profile-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 4px;
      background: var(--gradient);
    }

    /* ── Avatar Section ── */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrapper {
      position: relative;
      width: 150px;
      height: 150px;
      cursor: pointer;
    }

    .avatar-wrapper img {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #6366f1;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
      transition: all 0.3s;
      display: block;
    }

    .avatar-wrapper:hover img {
      opacity: 0.85;
    }

    .avatar-overlay {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: var(--gradient);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      border: 3px solid white;
      transition: all 0.3s;
    }

    .avatar-wrapper:hover .avatar-overlay {
      transform: scale(1.1);
    }

    #photoInput { display: none; }

    .avatar-hint {
      margin-top: 12px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
    }

    /* Upload progress */
    .upload-progress {
      display: none;
      margin-top: 14px;
      width: 100%;
      max-width: 200px;
    }

    .upload-progress-bar {
      height: 5px;
      background: #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
    }

    .upload-progress-fill {
      height: 100%;
      background: var(--gradient);
      border-radius: 10px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .upload-progress-text {
      font-size: 12px;
      color: #64748b;
      text-align: center;
      margin-top: 6px;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 22px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      color: #334155;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: #1e293b;
      background: white;
      transition: all 0.3s;
      resize: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
      outline: none;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-group input:disabled {
      background: #f8fafc;
      color: #94a3b8;
      cursor: not-allowed;
    }

    .char-count {
      text-align: right;
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }

    .char-count.near-limit { color: #f59e0b; }
    .char-count.at-limit   { color: #ef4444; }

    /* ── Save Button ── */
    .save-btn {
      width: 100%;
      padding: 18px;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
      position: relative;
      overflow: hidden;
      margin-top: 8px;
    }

    .save-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: left 0.5s;
    }

    .save-btn:hover::before { left: 100%; }
    .save-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
    }

    .save-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Alerts ── */
    .alert {
      display: none;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 18px;
      align-items: center;
      gap: 10px;
    }

    .alert.show { display: flex; }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #065f46;
    }

    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #991b1b;
    }

    /* ── Auth Loading Overlay ── */
    #authLoading {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(4px);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .auth-loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #authLoading p {
      color: #64748b;
      font-weight: 600;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      header { padding: 12px 20px; }
      .back-btn span { display: none; }
      .page-content { padding: 20px 16px 50px; }
      .profile-card { padding: 28px 20px; }
      .page-title h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- Auth loading overlay -->
  <div id="authLoading">
    <div class="auth-loading-spinner"></div>
    <p>Loading your profile...</p>
  </div>

  <!-- Header -->
  <header>
    <a href="index.html" class="logo">
      <img src="logo.png" alt="Worldwide Collab Logo" onerror="this.style.display='none'">
      <span>Worldwide Collab</span>
    </a>
    <a href="index.html" class="back-btn">
      <span>←</span>
      <span>Back to Home</span>
    </a>
  </header>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
      authDomain: "ww-c-5c5c1.firebaseapp.com",
      projectId: "ww-c-5c5c1",
      storageBucket: "ww-c-5c5c1.firebasestorage.app",
      messagingSenderId: "200600278915",
      appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
    };
    firebase.initializeApp(firebaseConfig);
  </script>

  <!-- Page Content -->
  <div class="page-content">
    <div class="page-title">
      <h1>My Profile</h1>
      <p>Manage your account details and photo</p>
    </div>

    <div class="profile-card">

      <!-- Avatar -->
      <div class="avatar-section">
        <div class="avatar-wrapper" onclick="document.getElementById('photoInput').click()">
          <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff&size=150" alt="Profile Photo">
          <div class="avatar-overlay">📷</div>
        </div>
        <input type="file" id="photoInput" accept="image/*" onchange="handlePhotoSelect(event)">
        <p class="avatar-hint">Click photo to change · Max 10 MB</p>

        <div class="upload-progress" id="uploadProgress">
          <div class="upload-progress-bar">
            <div class="upload-progress-fill" id="uploadProgressFill"></div>
          </div>
          <div class="upload-progress-text" id="uploadProgressText">Uploading...</div>
        </div>
      </div>

      <!-- Form -->
      <div class="form-group">
        <label for="fullName">Full Name *</label>
        <input type="text" id="fullName" placeholder="Enter your full name" required maxlength="60">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" disabled placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number <span style="font-weight:400;color:#94a3b8">(optional)</span></label>
        <input type="tel" id="phone" placeholder="+1 234 567 8900" maxlength="20">
      </div>

      <div class="form-group">
        <label for="bio">Bio <span style="font-weight:400;color:#94a3b8">(optional)</span></label>
        <textarea id="bio" rows="3" placeholder="Tell us a little about yourself..." maxlength="100" oninput="updateCharCount()"></textarea>
        <div class="char-count" id="charCount">0 / 100</div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="saveProfile()">
        <div class="spinner" id="saveSpinner"></div>
        <span id="saveBtnText">Save Changes</span>
      </button>

      <div class="alert alert-success" id="alertSuccess">
        ✅ Profile updated successfully!
      </div>
      <div class="alert alert-error" id="alertError">
        ❌ <span id="alertErrorMsg">Something went wrong. Please try again.</span>
      </div>
    </div>
  </div>

  <script>
    // ── Cloudinary config ──
    const CLOUDINARY_CLOUD_NAME = 'dicodvcuz';
    const CLOUDINARY_UPLOAD_PRESET = 'wwc_profiles';

    let currentUser = null;
    let newPhotoURL = null;

    // ── Auth Guard ──
    firebase.auth().onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      currentUser = user;
      document.getElementById('authLoading').style.display = 'none';
      await loadProfile(user);
    });

    // ── Load profile from Firestore ──
    async function loadProfile(user) {
      document.getElementById('email').value = user.email || '';

      try {
        const doc = await firebase.firestore().collection('users').doc(user.uid).get();
        if (doc.exists) {
          const data = doc.data();
          document.getElementById('fullName').value = data.displayName || user.displayName || '';
          document.getElementById('phone').value  = data.phone || '';
          document.getElementById('bio').value    = data.bio || '';
          updateCharCount();

          const photo = data.photoURL || user.photoURL;
          if (photo) setAvatarSrc(photo);
          else setAvatarFromName(data.displayName || user.displayName || user.email);
        } else {
          document.getElementById('fullName').value = user.displayName || '';
          if (user.photoURL) setAvatarSrc(user.photoURL);
          else setAvatarFromName(user.displayName || user.email);
        }
      } catch (err) {
        document.getElementById('fullName').value = user.displayName || '';
        if (user.photoURL) setAvatarSrc(user.photoURL);
        else setAvatarFromName(user.displayName || user.email);
      }
    }

    function setAvatarSrc(url) {
      document.getElementById('profileAvatar').src = url;
    }

    function setAvatarFromName(name) {
      document.getElementById('profileAvatar').src =
        `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=6366f1&color=fff&size=150`;
    }

    // ── Char counter ──
    function updateCharCount() {
      const bio = document.getElementById('bio').value;
      const len = bio.length;
      const el = document.getElementById('charCount');
      el.textContent = `${len} / 100`;
      el.className = 'char-count' + (len >= 100 ? ' at-limit' : len >= 80 ? ' near-limit' : '');
    }

    // ── Photo selection & upload ──
    async function handlePhotoSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Validate size (10 MB)
      if (file.size > 10 * 1024 * 1024) {
        showError('Photo must be smaller than 10 MB.');
        event.target.value = '';
        return;
      }

      // Validate type
      if (!file.type.startsWith('image/')) {
        showError('Please select a valid image file.');
        event.target.value = '';
        return;
      }

      // Preview immediately
      const reader = new FileReader();
      reader.onload = (e) => setAvatarSrc(e.target.result);
      reader.readAsDataURL(file);

      // Upload to Cloudinary
      await uploadToCloudinary(file);
    }

    async function uploadToCloudinary(file) {
      const progressEl   = document.getElementById('uploadProgress');
      const fillEl       = document.getElementById('uploadProgressFill');
      const textEl       = document.getElementById('uploadProgressText');

      progressEl.style.display = 'block';
      fillEl.style.width = '10%';
      textEl.textContent = 'Uploading photo...';

      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      formData.append('folder', 'wwc_profiles');

      try {
        // Simulate progress steps (XHR for real progress)
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);

        xhr.upload.onprogress = (e) => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 90);
            fillEl.style.width = pct + '%';
            textEl.textContent = `Uploading... ${pct}%`;
          }
        };

        const result = await new Promise((resolve, reject) => {
          xhr.onload  = () => resolve(JSON.parse(xhr.responseText));
          xhr.onerror = () => reject(new Error('Upload failed'));
          xhr.send(formData);
        });

        if (result.secure_url) {
          newPhotoURL = result.secure_url;
          fillEl.style.width = '100%';
          textEl.textContent = '✅ Photo uploaded!';
          setAvatarSrc(newPhotoURL);

          setTimeout(() => {
            progressEl.style.display = 'none';
            fillEl.style.width = '0%';
          }, 2000);
        } else {
          throw new Error(result.error?.message || 'Upload failed');
        }
      } catch (err) {
        progressEl.style.display = 'none';
        showError('Photo upload failed: ' + err.message);
      }
    }

    // ── Save profile ──
    async function saveProfile() {
      hideAlerts();

      const fullName = document.getElementById('fullName').value.trim();
      if (!fullName) {
        showError('Full name is required.');
        return;
      }

      if (!currentUser) {
        showError('You must be logged in.');
        return;
      }

      setSaving(true);

      try {
        const updateData = {
          displayName: fullName,
          phone: document.getElementById('phone').value.trim(),
          bio: document.getElementById('bio').value.trim(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (newPhotoURL) {
          updateData.photoURL = newPhotoURL;
        }

        // Save to Firestore
        await firebase.firestore().collection('users').doc(currentUser.uid).set(updateData, { merge: true });

        // Update Firebase Auth display name
        await currentUser.updateProfile({ displayName: fullName });

        showSuccess();
      } catch (err) {
        showError('Failed to save profile: ' + err.message);
      } finally {
        setSaving(false);
      }
    }

    // ── UI helpers ──
    function setSaving(saving) {
      const btn     = document.getElementById('saveBtn');
      const spinner = document.getElementById('saveSpinner');
      const text    = document.getElementById('saveBtnText');

      btn.disabled       = saving;
      spinner.style.display = saving ? 'block' : 'none';
      text.textContent   = saving ? 'Saving...' : 'Save Changes';
    }

    function showSuccess() {
      document.getElementById('alertSuccess').classList.add('show');
      document.getElementById('alertError').classList.remove('show');
      setTimeout(() => document.getElementById('alertSuccess').classList.remove('show'), 4000);
    }

    function showError(msg) {
      document.getElementById('alertErrorMsg').textContent = msg;
      document.getElementById('alertError').classList.add('show');
      document.getElementById('alertSuccess').classList.remove('show');
    }

    function hideAlerts() {
      document.getElementById('alertSuccess').classList.remove('show');
      document.getElementById('alertError').classList.remove('show');
    }
  </script>
</body>
</html>
