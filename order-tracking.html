<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Tracking – Worldwide Collab</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary:      #6366f1;
      --primary-dark: #4f46e5;
      --secondary:    #8b5cf6;
      --accent:       #06b6d4;
      --success:      #10b981;
      --warning:      #f59e0b;
      --danger:       #ef4444;
      --dark:         #0f172a;
      --mid:          #1e293b;
      --muted:        #64748b;
      --border:       #e2e8f0;
      --bg:           #f1f5f9;
      --card:         #ffffff;
      --gradient:     linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--mid);
    }

    /* ── HEADER ── */
    .header {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(99,102,241,0.12);
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 12px rgba(0,0,0,0.07);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 800;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .logo img {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      object-fit: cover;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px 6px 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--mid);
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 13px;
      font-weight: 700;
      overflow: hidden;
    }

    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .btn-logout {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    .btn-home {
      background: var(--gradient);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn-home:hover { opacity: .88; }

    /* ── AUTH GATE ── */
    #authGate {
      display: none;
      min-height: calc(100vh - 68px);
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--card);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
    }

    .auth-card .lock-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .auth-card h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--dark);
    }

    .auth-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .btn-login {
      display: inline-block;
      background: var(--gradient);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px 32px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .2s, transform .2s;
    }
    .btn-login:hover { opacity: .88; transform: translateY(-1px); }

    /* ── MAIN APP ── */
    #appContent {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      margin-bottom: 32px;
    }

    .page-title h1 {
      font-size: 26px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .page-title p {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .stat-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .stat-icon.blue   { background: #eff6ff; }
    .stat-icon.green  { background: #f0fdf4; }
    .stat-icon.orange { background: #fffbeb; }
    .stat-icon.purple { background: #faf5ff; }

    .stat-text .val {
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      line-height: 1;
    }

    .stat-text .lbl {
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 500;
    }

    /* ── SEARCH / FILTER BAR ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .search-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 11px 16px 11px 42px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--card);
      color: var(--mid);
      transition: border-color .2s;
    }
    .search-wrap input:focus { outline: none; border-color: var(--primary); }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .filter-btn {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(99,102,241,0.07);
    }

    .refresh-btn {
      background: var(--gradient);
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .2s;
    }
    .refresh-btn:hover { opacity: .88; }
    .refresh-btn.spinning svg { animation: spin .7s linear infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ORDERS TABLE ── */
    .orders-card {
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .orders-card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .orders-card-header h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .orders-card-header span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* Loading skeleton */
    .skeleton-row {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .skel {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Order rows */
    .order-row {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      gap: 12px;
      border-bottom: 1px solid #f8fafc;
      transition: background .18s;
      cursor: default;
    }

    .order-row:last-child { border-bottom: none; }
    .order-row:hover { background: #f8fafc; }

    .order-id-col {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      min-width: 120px;
      font-family: 'Courier New', monospace;
    }

    .order-service-col {
      flex: 1;
      min-width: 0;
    }

    .order-service-col .service-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--dark);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-service-col .service-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-date-col {
      font-size: 12px;
      color: var(--muted);
      min-width: 90px;
      text-align: center;
    }

    .order-amt-col {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      min-width: 70px;
      text-align: right;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      min-width: 100px;
      justify-content: center;
      white-space: nowrap;
    }

    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-pending    { background: #fffbeb; color: #92400e; }
    .status-pending::before    { background: #f59e0b; }
    .status-processing { background: #eff6ff; color: #1d4ed8; }
    .status-processing::before { background: #3b82f6; animation: pulse-dot 1.2s infinite; }
    .status-completed  { background: #f0fdf4; color: #065f46; }
    .status-completed::before  { background: #10b981; }
    .status-cancelled  { background: #fef2f2; color: #991b1b; }
    .status-cancelled::before  { background: #ef4444; }
    .status-delivered  { background: #f0fdf4; color: #065f46; }
    .status-delivered::before  { background: #10b981; }
    .status-inprogress { background: #eff6ff; color: #1d4ed8; }
    .status-inprogress::before { background: #3b82f6; animation: pulse-dot 1.2s infinite; }
    .status-unknown    { background: #f8fafc; color: var(--muted); }
    .status-unknown::before    { background: #94a3b8; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    /* Empty / Error state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; color: var(--dark); margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; color: var(--muted); line-height: 1.6; max-width: 320px; margin: 0 auto; }

    /* Live indicator */
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--success);
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 20px;
      padding: 3px 10px;
    }

    .live-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse-dot 1.2s infinite;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .header { padding: 0 16px; }
      #appContent { padding: 24px 14px 50px; }
      .order-row { flex-wrap: wrap; padding: 14px 16px; }
      .order-id-col { min-width: unset; width: 100%; margin-bottom: 4px; }
      .order-date-col { display: none; }
      .order-amt-col { min-width: unset; }
      .auth-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="header">
  <a class="logo" href="index.html">
    <img src="logo.png" alt="WWC" onerror="this.style.display='none'">
    Worldwide Collab
  </a>
  <div class="header-right">
    <div class="live-dot" id="liveIndicator" style="display:none">LIVE</div>
    <div class="user-chip" id="userChip" style="display:none">
      <div class="user-avatar" id="userAvatarEl">?</div>
      <span id="userNameEl">User</span>
    </div>
    <a href="index.html" class="btn-home">🏠 Home</a>
    <button class="btn-logout" id="logoutBtn" onclick="doLogout()" style="display:none">Logout</button>
  </div>
</header>

<!-- ── AUTH GATE (not logged in) ── -->
<div id="authGate" style="display:flex">
  <div class="auth-card">
    <div class="lock-icon">🔒</div>
    <h2>Login Required</h2>
    <p>Please log in to view your orders and track their real-time status.</p>
    <a href="login.html" class="btn-login">Login to Continue</a>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="appContent">

  <div class="page-title">
    <h1>📦 My Orders</h1>
    <p id="pageSubtitle">Loading your orders…</p>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon blue">📋</div>
      <div class="stat-text">
        <div class="val" id="statTotal">–</div>
        <div class="lbl">Total Orders</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon green">✅</div>
      <div class="stat-text">
        <div class="val" id="statCompleted">–</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon blue">⚡</div>
      <div class="stat-text">
        <div class="val" id="statActive">–</div>
        <div class="lbl">In Progress</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon orange">⏳</div>
      <div class="stat-text">
        <div class="val" id="statPending">–</div>
        <div class="lbl">Pending</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by Order ID or service…" oninput="renderOrders()">
    </div>
    <button class="filter-btn active" id="fAll"       onclick="setFilter('all')">All</button>
    <button class="filter-btn"        id="fPending"   onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn"        id="fActive"    onclick="setFilter('active')">In Progress</button>
    <button class="filter-btn"        id="fCompleted" onclick="setFilter('completed')">Completed</button>
    <button class="refresh-btn" id="refreshBtn" onclick="loadOrders(true)">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Orders card -->
  <div class="orders-card">
    <div class="orders-card-header">
      <h3>Order History</h3>
      <span id="lastUpdated"></span>
    </div>
    <div id="ordersBody">
      <!-- Skeleton -->
      <div class="skeleton-row">
        <div class="skel" style="width:110px;height:16px"></div>
        <div class="skel" style="flex:1;height:16px"></div>
        <div class="skel" style="width:80px;height:24px;border-radius:20px"></div>
      </div>
      <div class="skeleton-row">
        <div class="skel" style="width:110px;height:16px"></div>
        <div class="skel" style="flex:1;height:16px"></div>
        <div class="skel" style="width:80px;height:24px;border-radius:20px"></div>
      </div>
      <div class="skeleton-row">
        <div class="skel" style="width:110px;height:16px"></div>
        <div class="skel" style="flex:1;height:16px"></div>
        <div class="skel" style="width:80px;height:24px;border-radius:20px"></div>
      </div>
    </div>
  </div>

</div><!-- /appContent -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  /* ── Firebase ── */
  const firebaseConfig = {
    apiKey:            "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
    authDomain:        "ww-c-5c5c1.firebaseapp.com",
    projectId:         "ww-c-5c5c1",
    storageBucket:     "ww-c-5c5c1.firebasestorage.app",
    messagingSenderId: "200600278915",
    appId:             "1:200600278915:web:654a42ec7f71e9386e08b6"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  /* ── API Endpoints ── */
  const SHEET_API = "https://api.sheetbest.com/sheets/62416cad-7c75-4c01-8a76-e526af3d16ba";
  const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKAQPoGNp8XygCji0WOlvlK11UkwDf5qKtPZFEgKP7osITPED_tjYHnUe4CIrDWs--HGICB1I5a4gJ/pub?output=csv";

  /* ── State ── */
  let currentUser    = null;
  let allOrders      = [];
  let activeFilter   = 'all';
  let autoRefreshTimer = null;

  /* ── Auth listener ── */
  auth.onAuthStateChanged(user => {
    currentUser = user;
    if (user) {
      showApp(user);
      loadOrders();
      startAutoRefresh();
    } else {
      showGate();
    }
  });

  function showApp(user) {
    document.getElementById('authGate').style.display   = 'none';
    document.getElementById('appContent').style.display = 'block';
    document.getElementById('liveIndicator').style.display = 'inline-flex';
    document.getElementById('userChip').style.display   = 'flex';
    document.getElementById('logoutBtn').style.display  = 'inline-block';

    const nameEl   = document.getElementById('userNameEl');
    const avatarEl = document.getElementById('userAvatarEl');
    const name     = user.displayName || user.email.split('@')[0];
    nameEl.textContent = name;

    if (user.photoURL) {
      avatarEl.innerHTML = `<img src="${user.photoURL}" alt="">`;
    } else {
      avatarEl.textContent = name.charAt(0).toUpperCase();
    }

    document.getElementById('pageSubtitle').textContent =
      `Welcome back, ${name} — tracking your real-time orders`;
  }

  function showGate() {
    document.getElementById('authGate').style.display   = 'flex';
    document.getElementById('appContent').style.display = 'none';
  }

  function doLogout() {
    auth.signOut();
    clearInterval(autoRefreshTimer);
  }

  /* ── Auto refresh every 30 sec ── */
  function startAutoRefresh() {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = setInterval(() => loadOrders(false), 30000);
  }

  /* ── Load orders from Google Sheets ── */
  async function loadOrders(showSpin = false) {
    if (!currentUser) return;

    if (showSpin) {
      const btn = document.getElementById('refreshBtn');
      btn.classList.add('spinning');
      setTimeout(() => btn.classList.remove('spinning'), 1200);
    }

    try {
      /* Try SheetBest API first (JSON, easier to filter) */
      const res = await fetch(SHEET_API + "?_limit=500", { cache: 'no-store' });
      if (!res.ok) throw new Error('API failed');
      const data = await res.json();
      processOrders(data);
    } catch (e) {
      /* Fallback: CSV */
      try {
        const res  = await fetch(SHEET_CSV + "&t=" + Date.now(), { cache: 'no-store' });
        const text = await res.text();
        const data = csvToJson(text);
        processOrders(data);
      } catch (e2) {
        showError();
      }
    }
  }

  /* ── Parse CSV → JSON array ── */
  function csvToJson(csv) {
    const lines   = csv.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
      const vals = smartSplit(line);
      const obj  = {};
      headers.forEach((h, i) => { obj[h] = (vals[i] || '').trim().replace(/^"|"$/g, ''); });
      return obj;
    });
  }

  function smartSplit(line) {
    const result = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
      cur += ch;
    }
    result.push(cur);
    return result;
  }

  /* ── Match user email/uid across common column names ── */
  function isUserOrder(row) {
    const email = (currentUser.email || '').toLowerCase();
    const uid   = currentUser.uid;

    const searchFields = [
      'email', 'Email', 'EMAIL',
      'user_email', 'userEmail', 'user email',
      'uid', 'UID', 'userId', 'user_id',
      'customer_email', 'customerEmail'
    ];

    for (const f of searchFields) {
      const v = (row[f] || '').toLowerCase().trim();
      if (v === email || v === uid.toLowerCase()) return true;
    }
    return false;
  }

  /* ── Normalize status ── */
  function normalizeStatus(raw) {
    const s = (raw || '').toLowerCase().trim().replace(/\s+/g, '');
    if (['completed','complete','done','delivered','success'].includes(s)) return 'completed';
    if (['inprogress','processing','active','running','started'].includes(s)) return 'inprogress';
    if (['pending','waiting','queued','new'].includes(s))                     return 'pending';
    if (['cancelled','canceled','failed','rejected'].includes(s))             return 'cancelled';
    return 'unknown';
  }

  /* ── Status label ── */
  function statusLabel(norm) {
    const map = {
      completed:  'Completed',
      inprogress: 'In Progress',
      pending:    'Pending',
      cancelled:  'Cancelled',
      unknown:    'Unknown'
    };
    return map[norm] || 'Unknown';
  }

  /* ── Process & filter rows ── */
  function processOrders(data) {
    // Filter rows belonging to this user
    const myOrders = data.filter(r => isUserOrder(r));

    // Map to normalised structure
    allOrders = myOrders.map(r => {
      // Try common field name variants
      const id      = r['Order ID'] || r['order_id'] || r['OrderID'] || r['orderId'] || r['id'] || '–';
      const service = r['Service']  || r['service']  || r['Package'] || r['package'] || r['Product'] || r['product'] || '–';
      const platform= r['Platform'] || r['platform'] || '';
      const qty     = r['Quantity'] || r['quantity'] || r['qty']     || '';
      const amount  = r['Amount']   || r['amount']   || r['Price']   || r['price']   || '';
      const status  = r['Status']   || r['status']   || r['Status '] || '';
      const date    = r['Date']     || r['date']      || r['Timestamp'] || r['timestamp'] || r['Created'] || '';
      const link    = r['Link']     || r['link']      || r['URL']   || '';

      return { id, service, platform, qty, amount, rawStatus: status, status: normalizeStatus(status), date, link };
    }).sort((a, b) => {
      // Sort newest first (by date if parseable)
      const da = new Date(a.date), db = new Date(b.date);
      if (!isNaN(da) && !isNaN(db)) return db - da;
      return 0;
    });

    updateStats();
    renderOrders();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  }

  /* ── Stats ── */
  function updateStats() {
    document.getElementById('statTotal').textContent     = allOrders.length;
    document.getElementById('statCompleted').textContent = allOrders.filter(o => o.status === 'completed').length;
    document.getElementById('statActive').textContent    = allOrders.filter(o => o.status === 'inprogress').length;
    document.getElementById('statPending').textContent   = allOrders.filter(o => o.status === 'pending').length;
  }

  /* ── Filter toggle ── */
  function setFilter(f) {
    activeFilter = f;
    ['All','Pending','Active','Completed'].forEach(x => {
      document.getElementById('f' + x).classList.remove('active');
    });
    const map = { all:'All', pending:'Pending', active:'Active', completed:'Completed' };
    document.getElementById('f' + map[f]).classList.add('active');
    renderOrders();
  }

  /* ── Render ── */
  function renderOrders() {
    const query = (document.getElementById('searchInput').value || '').toLowerCase();

    let list = allOrders;

    // Filter by tab
    if (activeFilter === 'pending')   list = list.filter(o => o.status === 'pending');
    if (activeFilter === 'active')    list = list.filter(o => o.status === 'inprogress');
    if (activeFilter === 'completed') list = list.filter(o => o.status === 'completed');

    // Filter by search
    if (query) {
      list = list.filter(o =>
        o.id.toLowerCase().includes(query) ||
        o.service.toLowerCase().includes(query) ||
        o.platform.toLowerCase().includes(query)
      );
    }

    const body = document.getElementById('ordersBody');

    if (list.length === 0) {
      body.innerHTML = `
        <div class="empty-state">
          <div class="icon">${query || activeFilter !== 'all' ? '🔍' : '📭'}</div>
          <h3>${query || activeFilter !== 'all' ? 'No matching orders' : 'No orders yet'}</h3>
          <p>${query || activeFilter !== 'all'
            ? 'Try adjusting your search or filter.'
            : 'Place your first order and it will appear here in real time.'}</p>
        </div>`;
      return;
    }

    body.innerHTML = list.map(o => {
      const statusClass = 'status-' + o.status;
      const label       = statusLabel(o.status);
      const dateStr     = formatDate(o.date);
      const amtStr      = o.amount ? (o.amount.includes('$') || o.amount.includes('£') || o.amount.includes('€') ? o.amount : '$' + o.amount) : '–';

      return `
        <div class="order-row">
          <div class="order-id-col">${escHtml(o.id)}</div>
          <div class="order-service-col">
            <div class="service-name">${escHtml(o.service)}</div>
            <div class="service-meta">${[o.platform, o.qty ? o.qty + ' qty' : ''].filter(Boolean).join(' · ') || escHtml(o.link || '')}</div>
          </div>
          <div class="order-date-col">${dateStr}</div>
          <div class="order-amt-col">${amtStr}</div>
          <span class="status-badge ${statusClass}">${label}</span>
        </div>`;
    }).join('');
  }

  function formatDate(raw) {
    if (!raw) return '–';
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: '2-digit' });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function showError() {
    document.getElementById('ordersBody').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚠️</div>
        <h3>Could not load orders</h3>
        <p>Unable to reach the data source. Please check your connection and try refreshing.</p>
      </div>`;
  }
</script>
</body>
