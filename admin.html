<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel – KashRun</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ===== RESET & TOKENS ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --pr:#FF6B00;--pr-dk:#e55d00;--pr-lt:rgba(255,107,0,.10);
  --ok:#10B981;--err:#EF4444;--warn:#F59E0B;--info:#3B82F6;
  --bg:#F1F5F9;--white:#fff;
  --c0:#0F172A;--c1:#1E293B;--c2:#334155;--c3:#475569;
  --c4:#64748B;--c5:#94A3B8;--c6:#CBD5E1;--c7:#E2E8F0;--c8:#F1F5F9;
  --rad:14px;--rad-sm:8px;
  --sh0:0 1px 2px rgba(0,0,0,.06);
  --sh1:0 2px 8px rgba(0,0,0,.08);
  --sh2:0 4px 20px rgba(0,0,0,.11);
  --sh3:0 8px 40px rgba(0,0,0,.15);
  --sh-pr:0 4px 20px rgba(255,107,0,.25);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}

/* ── Dark mode ── */
body.dark{
  --bg:#090e1a;--white:#0F172A;
  --c0:#F1F5F9;--c1:#E2E8F0;--c2:#CBD5E1;--c3:#94A3B8;
  --c4:#64748B;--c5:#475569;--c6:#334155;--c7:#1E293B;--c8:#111827;
  --sh1:0 2px 8px rgba(0,0,0,.3);--sh2:0 4px 20px rgba(0,0,0,.4);
}

body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--c0);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ===== ACCESS SCREEN ===== */
#accessScreen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#0F172A 0%,#1a2d4a 100%);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;padding:20px;
}
.access-box{
  background:#fff;border-radius:24px;padding:44px 36px;
  text-align:center;max-width:380px;width:100%;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.access-logo{font-size:2rem;font-weight:900;color:var(--pr);letter-spacing:-1px;margin-bottom:4px}
.access-sub{font-size:.82rem;color:#64748B;margin-bottom:28px;font-weight:500}
.access-box input{
  width:100%;padding:14px 18px;border:2px solid #E2E8F0;
  border-radius:12px;font-size:1.1rem;text-align:center;
  letter-spacing:4px;font-weight:700;outline:none;
  transition:border var(--tr);font-family:'Inter',sans-serif;
}
.access-box input:focus{border-color:var(--pr);box-shadow:0 0 0 4px rgba(255,107,0,.12)}
.access-box button{
  width:100%;margin-top:14px;background:var(--pr);color:#fff;
  border:none;border-radius:50px;padding:14px;
  font-size:1rem;font-weight:800;cursor:pointer;
  transition:var(--tr);font-family:'Inter',sans-serif;
  box-shadow:var(--sh-pr);
}
.access-box button:hover{background:var(--pr-dk);transform:translateY(-1px)}
#accessError{color:#EF4444;font-size:.85rem;margin-top:10px;display:none;font-weight:600}

/* ===== NAVBAR ===== */
.navbar{
  background:var(--white);border-bottom:1px solid var(--c7);
  padding:0 5%;display:flex;align-items:center;
  justify-content:space-between;height:62px;
  position:sticky;top:0;z-index:200;
  box-shadow:var(--sh0);
}
.nav-brand{font-weight:900;font-size:1.1rem;color:var(--pr);display:flex;align-items:center;gap:8px}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-btn{
  background:var(--c8);border:1.5px solid var(--c7);
  border-radius:50px;padding:7px 14px;cursor:pointer;
  font-size:.78rem;font-weight:700;transition:var(--tr);
  font-family:'Inter',sans-serif;color:var(--c0);
  display:inline-flex;align-items:center;gap:5px;
}
.nav-btn:hover{border-color:var(--pr);color:var(--pr)}
.nav-btn.primary{background:var(--pr);color:#fff;border-color:var(--pr)}
.nav-btn.primary:hover{background:var(--pr-dk);color:#fff}
.live-dot{width:8px;height:8px;border-radius:50%;background:#10B981;display:inline-block;box-shadow:0 0 0 3px rgba(16,185,129,.25);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,.25)}50%{box-shadow:0 0 0 6px rgba(16,185,129,.1)}}

/* ===== MAIN LAYOUT ===== */
.main{padding:28px 5% 80px;max-width:1200px;margin:0 auto}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--white);border-radius:var(--rad);
  padding:20px 22px;box-shadow:var(--sh1);
  display:flex;align-items:center;gap:14px;
  border:1px solid var(--c7);transition:var(--tr);
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.stat-icon{font-size:1.6rem;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.si-orange{background:rgba(255,107,0,.1)} .si-yellow{background:rgba(245,158,11,.1)}
.si-green{background:rgba(16,185,129,.1)} .si-blue{background:rgba(59,130,246,.1)}
.si-red{background:rgba(239,68,68,.1)}
.stat-num{font-size:1.7rem;font-weight:900;line-height:1;color:var(--c0)}
.stat-lbl{font-size:.73rem;color:var(--c5);font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}

/* ===== TOOLBAR ===== */
.toolbar{
  background:var(--white);border-radius:var(--rad);
  padding:16px 20px;box-shadow:var(--sh1);
  display:flex;flex-wrap:wrap;gap:10px;
  align-items:center;margin-bottom:20px;
  border:1px solid var(--c7);
}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none;opacity:.5}
.search-input{
  width:100%;padding:9px 12px 9px 34px;
  border:2px solid var(--c7);border-radius:50px;
  font-size:.85rem;font-family:'Inter',sans-serif;
  outline:none;transition:var(--tr);
  background:var(--c8);color:var(--c0);
}
.search-input:focus{border-color:var(--pr);background:var(--white);box-shadow:0 0 0 3px rgba(255,107,0,.1)}
.filter-group{display:flex;gap:5px;flex-wrap:wrap}
.filter-btn{
  padding:6px 13px;border-radius:50px;
  border:1.5px solid var(--c7);background:var(--white);
  font-size:.75rem;font-weight:700;cursor:pointer;
  transition:var(--tr);white-space:nowrap;
  font-family:'Inter',sans-serif;color:var(--c3);
}
.filter-btn:hover{border-color:var(--pr);color:var(--pr)}
.filter-btn.active{border-color:var(--pr);background:var(--pr);color:#fff}
.tb-btn{
  background:var(--white);border:1.5px solid var(--c7);
  border-radius:50px;padding:6px 13px;
  font-size:.75rem;font-weight:700;cursor:pointer;
  transition:var(--tr);font-family:'Inter',sans-serif;color:var(--c3);
  display:inline-flex;align-items:center;gap:5px;
}
.tb-btn:hover{border-color:var(--c2);color:var(--c0)}

/* ===== ORDERS LIST ===== */
#ordersList{display:flex;flex-direction:column;gap:14px}

/* ===== ACCORDION ORDER CARD ===== */
.order-card{
  background:var(--white);border-radius:var(--rad);
  box-shadow:var(--sh1);border:1px solid var(--c7);
  overflow:hidden;animation:fadeUp .3s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Card Header (always visible) */
.card-head{
  display:flex;align-items:center;gap:12px;
  padding:18px 22px;border-left:4px solid var(--pr);
  flex-wrap:wrap;cursor:pointer;
  transition:background var(--tr);
  user-select:none;
}
.card-head:hover{background:var(--c8)}
.ch-id{font-size:1rem;font-weight:900;color:var(--c0);letter-spacing:-.3px}
.ch-name{font-size:.85rem;font-weight:600;color:var(--c3);margin-top:1px}
.ch-date{font-size:.72rem;color:var(--c5);margin-top:2px;font-weight:500}
.ch-meta{flex:1;min-width:0}
.ch-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ch-amount{font-size:1rem;font-weight:900;color:var(--pr)}
.status-badge{
  display:inline-flex;align-items:center;
  padding:4px 11px;border-radius:50px;
  font-size:.72rem;font-weight:800;letter-spacing:.3px;
  text-transform:uppercase;
}
.sb-Pending{background:#FEF3C7;color:#92400E}
.sb-Confirmed{background:#DBEAFE;color:#1E40AF}
.sb-Preparing{background:#EDE9FE;color:#5B21B6}
.sb-OutForDelivery, .sb-Out-For-Delivery{background:#D1FAE5;color:#065F46}
.sb-Delivered{background:#D1FAE5;color:#065F46}
.sb-Cancelled{background:#FEE2E2;color:#991B1B}

.ch-chevron{
  width:28px;height:28px;border-radius:50%;
  background:var(--c8);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform .3s ease, background var(--tr);
}
.card-head.open .ch-chevron{transform:rotate(180deg);background:var(--pr-lt)}

/* Accordion toggle button row */
.card-toggle{
  width:100%;background:var(--c8);border:none;
  border-top:1px solid var(--c7);
  padding:11px 22px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;font-family:'Inter',sans-serif;
  font-size:.83rem;font-weight:700;color:var(--pr);
  transition:var(--tr);
}
.card-toggle:hover{background:var(--pr-lt)}
.card-toggle.open{color:var(--pr-dk)}

/* Accordion Body */
.card-body{max-height:0;overflow:hidden;transition:max-height .42s cubic-bezier(.4,0,.2,1)}
.card-body.open{max-height:3200px}
.card-inner{padding:28px 24px}

/* ===== SECTION LABEL ===== */
.sec-lbl{
  font-size:.7rem;font-weight:800;color:var(--c5);
  text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.sec-sep{border:none;border-top:1px solid var(--c7);margin:22px 0}

/* ===== INFO GRID ===== */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:4px}
.info-item label{font-size:.68rem;font-weight:800;color:var(--c5);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.info-item .iv{font-size:.9rem;font-weight:700;color:var(--c0);word-break:break-word}
.info-item .iv.mono{font-family:monospace;letter-spacing:.5px}
.addr-block{
  background:var(--c8);border-radius:10px;
  padding:14px 16px;border-left:3px solid var(--pr);
  font-size:.88rem;font-weight:600;color:var(--c0);
  line-height:1.8;
}

/* ===== ITEMS TABLE ===== */
.items-tbl{width:100%;border-collapse:collapse;font-size:.84rem}
.items-tbl th{
  text-align:left;font-size:.68rem;font-weight:800;
  color:var(--c5);text-transform:uppercase;letter-spacing:.5px;
  padding:8px 10px;background:var(--c8);
}
.items-tbl td{padding:10px 10px;border-bottom:1px solid var(--c7);vertical-align:middle}
.items-tbl tr:last-child td{border-bottom:none}
.item-name-td{font-weight:700;color:var(--c0)}
.size-tag{
  display:inline-block;background:var(--c7);
  color:var(--c3);font-size:.68rem;font-weight:700;
  padding:2px 7px;border-radius:4px;margin-left:5px;
}
.item-qty-td{text-align:center;font-weight:600;color:var(--c4)}
.item-price-td{text-align:right;font-weight:800;color:var(--c0)}

/* ===== FIN SUMMARY ===== */
.fin-rows{display:flex;flex-direction:column;gap:9px}
.fin-row{display:flex;justify-content:space-between;align-items:center;font-size:.88rem}
.fin-row .fl{color:var(--c4);font-weight:500}
.fin-row .fv{font-weight:700;color:var(--c0)}
.fin-total{padding-top:11px;border-top:2px solid var(--c7);margin-top:4px}
.fin-total .fl{font-weight:800;font-size:.92rem;color:var(--c0)}
.fin-total .fv{font-weight:900;font-size:1.05rem;color:var(--pr)}
.fin-advance .fv{color:var(--ok)}
.fin-remaining .fv{color:var(--warn)}

/* ===== PAY DETAILS ===== */
.pay-rows{display:flex;flex-direction:column;gap:9px}
.pay-row{display:flex;justify-content:space-between;align-items:center;font-size:.88rem}
.pay-row .pl{color:var(--c4);font-weight:500}
.pay-row .pv{font-weight:700;color:var(--c0)}
.pay-chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:800}
.pc-paid{background:#D1FAE5;color:#065F46}
.pc-partial{background:#DBEAFE;color:#1E40AF}
.pc-pending{background:#FEF3C7;color:#92400E}

/* ===== STATUS DROPDOWN ===== */
.status-select{
  padding:7px 12px;border:2px solid var(--c7);
  border-radius:8px;font-size:.82rem;
  font-family:'Inter',sans-serif;cursor:pointer;
  outline:none;background:var(--white);
  color:var(--c0);transition:var(--tr);font-weight:600;
}
.status-select:focus{border-color:var(--pr)}

/* ===== ACTION BUTTONS ===== */
.action-row{
  display:flex;flex-wrap:wrap;gap:9px;
  margin-top:22px;padding-top:20px;
  border-top:1px solid var(--c7);
}
.act-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 16px;border-radius:50px;
  font-size:.8rem;font-weight:800;cursor:pointer;
  transition:var(--tr);font-family:'Inter',sans-serif;
  border:2px solid transparent;text-decoration:none;
  white-space:nowrap;
}
.act-call{background:var(--pr);color:#fff;border-color:var(--pr)}
.act-call:hover{background:var(--pr-dk);transform:translateY(-1px);box-shadow:var(--sh-pr)}
.act-copy{background:var(--white);color:var(--c0);border-color:var(--c7)}
.act-copy:hover{border-color:var(--info);color:var(--info)}
.act-pdf{background:var(--white);color:var(--c0);border-color:var(--c7)}
.act-pdf:hover{border-color:var(--err);color:var(--err)}
.act-print{background:var(--white);color:var(--c0);border-color:var(--c7)}
.act-print:hover{border-color:var(--c2);color:var(--c2)}
.act-deliver{background:var(--ok);color:#fff;border-color:var(--ok)}
.act-deliver:hover{background:#059669;transform:translateY(-1px)}
.act-status{background:var(--white);color:var(--c0);border-color:var(--c7);padding:0}

/* ===== SKELETON ===== */
.skeleton-card{
  background:var(--white);border-radius:var(--rad);
  padding:22px;box-shadow:var(--sh1);border:1px solid var(--c7);
}
.sk{
  background:linear-gradient(90deg,var(--c7) 25%,var(--c8) 50%,var(--c7) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:6px;height:13px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:70px 20px;color:var(--c5)}
.empty-state .ei{font-size:3.5rem;margin-bottom:16px}
.empty-state h3{font-size:1.1rem;font-weight:800;margin-bottom:8px;color:var(--c0)}

/* ===== TOAST ===== */
#toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px);
  background:#1E293B;color:#fff;
  padding:12px 26px;border-radius:50px;
  font-size:.85rem;font-weight:700;z-index:9999;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 30px rgba(0,0,0,.35);
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ===== PRINT STYLES ===== */
@media print{
  body *{visibility:hidden}
  #printArea,#printArea *{visibility:visible}
  #printArea{
    position:fixed;inset:0;
    padding:24px 32px;
    background:#fff;
    font-family:'Inter',sans-serif;
    font-size:11px;
    color:#0F172A;
  }
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .main{padding:16px 4% 70px}
  .card-head{padding:14px 16px;gap:8px}
  .card-inner{padding:18px 14px}
  .action-row{gap:7px}
  .act-btn{padding:8px 12px;font-size:.75rem}
  .info-grid{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:360px){
  .info-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ===== ACCESS SCREEN ===== -->
<div id="accessScreen">
  <div class="access-box">
    <div class="access-logo">🍽️ KashRun</div>
    <div class="access-sub">Admin Panel · Restricted Access</div>
    <input type="password" id="accessInput" placeholder="Enter access code" autocomplete="off"
      onkeydown="if(event.key==='Enter')checkAccess()">
    <div id="accessError">❌ Incorrect access code. Try again.</div>
    <button onclick="checkAccess()">Unlock Dashboard →</button>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div id="dashboard" style="display:none">

  <nav class="navbar">
    <div class="nav-brand">
      🍽️ KashRun Admin
      <span class="live-dot" title="Live updates active"></span>
    </div>
    <div class="nav-right">
      <button class="nav-btn" onclick="toggleDark()" id="darkBtn">🌙 Dark</button>
      <button class="nav-btn" onclick="exportCSV()">📥 CSV</button>
      <a href="index.html" class="nav-btn">← Site</a>
    </div>
  </nav>

  <div class="main">

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon si-orange">📋</div>
        <div><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total Orders</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-yellow">⏳</div>
        <div><div class="stat-num" id="statPending">—</div><div class="stat-lbl">Pending</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-blue">🚀</div>
        <div><div class="stat-num" id="statActive">—</div><div class="stat-lbl">Active</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-green">✅</div>
        <div><div class="stat-num" id="statDelivered">—</div><div class="stat-lbl">Delivered</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-green">💰</div>
        <div><div class="stat-num" id="statRevenue">—</div><div class="stat-lbl">Revenue</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon si-red">❌</div>
        <div><div class="stat-num" id="statCancelled">—</div><div class="stat-lbl">Cancelled</div></div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput"
          placeholder="Search by Order ID, Name, Phone..."
          oninput="filterOrders()">
      </div>
      <div class="filter-group" id="filterGroup">
        <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('Confirmed',this)">Confirmed</button>
        <button class="filter-btn" onclick="setFilter('Preparing',this)">Preparing</button>
        <button class="filter-btn" onclick="setFilter('Out For Delivery',this)">Out For Delivery</button>
        <button class="filter-btn" onclick="setFilter('Delivered',this)">Delivered</button>
        <button class="filter-btn" onclick="setFilter('Cancelled',this)">Cancelled</button>
      </div>
      <button class="tb-btn" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <!-- ORDERS LIST -->
    <div id="ordersList"></div>

  </div><!-- /.main -->
</div><!-- /#dashboard -->

<!-- PRINT AREA (hidden, populated before print) -->
<div id="printArea" style="display:none"></div>

<div id="toast"></div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ── Firebase ── */
const firebaseConfig = {
  apiKey:            "AIzaSyDvViMeJbOdLvNT1163vlp7fPIXK6qJ8Qk",
  authDomain:        "kashrun-6ac6a.firebaseapp.com",
  projectId:         "kashrun-6ac6a",
  storageBucket:     "kashrun-6ac6a.firebasestorage.app",
  messagingSenderId: "466142826836",
  appId:             "1:466142826836:web:8fbcd0a829d582429ff8c1"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

/* ── State ── */
let allOrders    = [];      // raw sorted array
let docIdMap     = {};      // orderId → Firestore docId
let currentFilter= 'All';
let unsubscribe  = null;    // onSnapshot cleanup

/* ══════════════════════════════════════
   ACCESS CHECK
══════════════════════════════════════ */
window.checkAccess = () => {
  const code = document.getElementById('accessInput').value.trim();
  if (code === 'KASHRUN2026') {
    document.getElementById('accessScreen').style.display = 'none';
    document.getElementById('dashboard').style.display   = 'block';
    startRealtimeListener();
  } else {
    const err = document.getElementById('accessError');
    err.style.display = 'block';
    setTimeout(() => err.style.display = 'none', 3000);
    document.getElementById('accessInput').value = '';
  }
};

/* ══════════════════════════════════════
   REAL-TIME FIRESTORE LISTENER
══════════════════════════════════════ */
function startRealtimeListener() {
  showSkeleton();
  if (unsubscribe) unsubscribe(); // cleanup old listener

  unsubscribe = onSnapshot(collection(db, 'orders'), snap => {
    allOrders = [];
    docIdMap  = {};
    snap.forEach(d => {
      const data = { ...d.data(), _docId: d.id };
      allOrders.push(data);
      docIdMap[data.orderId] = d.id;
    });
    // Newest first
    allOrders.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    updateStats();
    filterOrders();
  }, err => {
    console.error('Firestore listener error:', err);
    showToast('⚠️ Connection error. Retrying...');
  });
}

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
function updateStats() {
  const total     = allOrders.length;
  const pending   = allOrders.filter(o => o.status === 'Pending').length;
  const active    = allOrders.filter(o => ['Confirmed','Preparing','Out For Delivery'].includes(o.status)).length;
  const delivered = allOrders.filter(o => o.status === 'Delivered').length;
  const cancelled = allOrders.filter(o => o.status === 'Cancelled').length;
  const revenue   = allOrders
    .filter(o => o.status === 'Delivered')
    .reduce((s, o) => s + Number(o.totalAmount || o.grandTotal || 0), 0);

  document.getElementById('statTotal').textContent     = total;
  document.getElementById('statPending').textContent   = pending;
  document.getElementById('statActive').textContent    = active;
  document.getElementById('statDelivered').textContent = delivered;
  document.getElementById('statCancelled').textContent = cancelled;
  document.getElementById('statRevenue').textContent   = '₹' + revenue.toLocaleString('en-IN');
}

/* ══════════════════════════════════════
   FILTER + SEARCH
══════════════════════════════════════ */
window.filterOrders = () => {
  const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
  let list = allOrders;
  if (currentFilter !== 'All') list = list.filter(o => o.status === currentFilter);
  if (q) list = list.filter(o =>
    (o.orderId      || '').toLowerCase().includes(q) ||
    (o.customerName || '').toLowerCase().includes(q) ||
    (o.phoneNumber  || '').includes(q)
  );
  renderOrders(list);
};

window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterOrders();
};

/* ══════════════════════════════════════
   SKELETON LOADER
══════════════════════════════════════ */
function showSkeleton() {
  const html = Array(4).fill(0).map(() => `
    <div class="skeleton-card" style="margin-bottom:12px">
      <div style="display:flex;gap:16px;align-items:center;margin-bottom:14px">
        <div class="sk" style="width:90px"></div>
        <div class="sk" style="width:140px"></div>
        <div class="sk" style="width:80px;margin-left:auto"></div>
      </div>
      <div class="sk" style="width:60%;margin-bottom:8px"></div>
      <div class="sk" style="width:40%"></div>
    </div>`).join('');
  document.getElementById('ordersList').innerHTML = html;
}

/* ══════════════════════════════════════
   HELPERS
══════════════════════════════════════ */
function fmtDate(ts) {
  if (!ts) return '—';
  try {
    return new Date(ts).toLocaleString('en-IN', {
      day: 'numeric', month: 'long', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  } catch { return String(ts); }
}

function fullAddress(o) {
  return [o.houseNumber, o.street, o.village, o.landmark, o.pincode]
    .filter(Boolean).join(', ') || '—';
}

function statusBadgeClass(s) {
  const map = {
    'Pending':'sb-Pending','Confirmed':'sb-Confirmed','Preparing':'sb-Preparing',
    'Out For Delivery':'sb-OutForDelivery','Delivered':'sb-Delivered','Cancelled':'sb-Cancelled'
  };
  return map[s] || 'sb-Pending';
}

function payChipClass(s) {
  if (!s) return 'pc-pending';
  const l = s.toLowerCase();
  if (l.includes('paid') && !l.includes('partial')) return 'pc-paid';
  if (l.includes('partial') || l.includes('advance')) return 'pc-partial';
  return 'pc-pending';
}

/* ══════════════════════════════════════
   RENDER ORDER CARDS
══════════════════════════════════════ */
function renderOrders(list) {
  const wrap = document.getElementById('ordersList');
  if (!list.length) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="ei">📭</div>
      <h3>No orders found</h3>
      <p>Try a different search or filter.</p>
    </div>`;
    return;
  }

  wrap.innerHTML = list.map((o, idx) => buildCard(o, idx)).join('');
}

function buildCard(o, idx) {
  const id      = o.orderId || '—';
  const name    = o.customerName || o.name || '—';
  const phone   = o.phoneNumber  || o.phone || '';
  const altPhone= o.alternatePhone || o.altPhoneNumber || o.altPhone || '';
  const status  = o.status || 'Pending';
  const date    = fmtDate(o.createdAt);
  const addr    = fullAddress(o);
  const items   = o.items || [];

  const subtotal  = Number(o.subtotal   || o.itemsTotal || 0);
  const delivFee  = Number(o.deliveryFee || o.deliveryCharge || 0);
  const tax       = Number(o.tax || 0);
  const grand     = Number(o.totalAmount || o.grandTotal || (subtotal + delivFee + tax));
  const advance   = Number(o.advancePaid || 0);
  const remaining = Math.max(grand - advance, 0);
  const payType   = o.paymentType   || o.paymentMethod || '—';
  const payStatus = o.paymentStatus || '—';
  const upi       = o.selectedUPI   || o.upiMethod || '';
  const utr       = o.utrNumber     || o.utr || '';
  const note      = o.specialInstructions || o.notes || '';

  const STATUSES = ['Pending','Confirmed','Preparing','Out For Delivery','Delivered','Cancelled'];

  /* Items table rows */
  const itemRows = items.map(i => `
    <tr>
      <td class="item-name-td">
        ${i.name || '—'}
        ${i.selectedSize ? `<span class="size-tag">${i.selectedSize}</span>` : ''}
      </td>
      <td class="item-qty-td">×${i.quantity || 1}</td>
      <td class="item-price-td">₹${((i.price || 0) * (i.quantity || 1)).toLocaleString('en-IN')}</td>
    </tr>`).join('');

  /* Inline data attribute for JS actions (JSON-safe) */
  const safeData = encodeURIComponent(JSON.stringify(o));

  return `
  <div class="order-card" id="oc-${idx}" style="animation-delay:${Math.min(idx * .06, .5)}s">

    <!-- Header summary (always visible) -->
    <div class="card-head" id="ch-${idx}" onclick="toggleCard(${idx})">
      <div class="ch-meta">
        <div class="ch-id">${id}</div>
        <div class="ch-name">${name}</div>
        <div class="ch-date">${date}</div>
      </div>
      <div class="ch-right">
        <span class="status-badge ${statusBadgeClass(status)}">${status}</span>
        <span class="ch-amount">₹${grand.toLocaleString('en-IN')}</span>
        <span class="ch-chevron">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
        </span>
      </div>
    </div>

    <!-- Toggle label button -->
    <button class="card-toggle" id="ct-${idx}" onclick="toggleCard(${idx})">
      <span id="ct-label-${idx}">View Full Order</span>
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
    </button>

    <!-- Accordion body -->
    <div class="card-body" id="cb-${idx}">
      <div class="card-inner">

        <!-- Customer Details -->
        <div class="sec-lbl">👤 Customer Details</div>
        <div class="info-grid" style="margin-bottom:14px">
          <div class="info-item">
            <label>Customer Name</label>
            <div class="iv">${name}</div>
          </div>
          <div class="info-item">
            <label>Primary Phone</label>
            <div class="iv"><a href="tel:${phone}" style="color:var(--pr);text-decoration:none;font-weight:700">${phone || '—'}</a></div>
          </div>
          ${altPhone ? `<div class="info-item">
            <label>Alt. Phone</label>
            <div class="iv"><a href="tel:${altPhone}" style="color:var(--c3);text-decoration:none;font-weight:700">${altPhone}</a></div>
          </div>` : ''}
          <div class="info-item">
            <label>Order Date</label>
            <div class="iv" style="font-size:.82rem">${date}</div>
          </div>
        </div>

        <!-- Full Address -->
        <div class="sec-lbl" style="margin-top:6px">📍 Delivery Address</div>
        <div class="addr-block">${addr}</div>
        ${note ? `<div style="margin-top:10px;padding:10px 14px;background:#FEF3C7;border-radius:8px;font-size:.83rem;color:#92400E;font-weight:600">
          📝 <strong>Special Instructions:</strong> ${note}
        </div>` : ''}

        <hr class="sec-sep">

        <!-- Items -->
        <div class="sec-lbl">🍔 Items Ordered</div>
        ${items.length ? `<table class="items-tbl">
          <thead><tr>
            <th>Item</th>
            <th style="text-align:center">Qty</th>
            <th style="text-align:right">Price</th>
          </tr></thead>
          <tbody>${itemRows}</tbody>
        </table>` : '<p style="color:var(--c5);font-size:.85rem">No items.</p>'}

        <hr class="sec-sep">

        <!-- Financial Summary -->
        <div class="sec-lbl">💰 Financial Summary</div>
        <div class="fin-rows">
          <div class="fin-row"><span class="fl">Subtotal</span><span class="fv">₹${subtotal.toLocaleString('en-IN')}</span></div>
          <div class="fin-row"><span class="fl">Delivery Fee</span><span class="fv">₹${delivFee.toLocaleString('en-IN')}</span></div>
          ${tax > 0 ? `<div class="fin-row"><span class="fl">Tax</span><span class="fv">₹${tax.toLocaleString('en-IN')}</span></div>` : ''}
          <div class="fin-row fin-total"><span class="fl">Grand Total</span><span class="fv">₹${grand.toLocaleString('en-IN')}</span></div>
          ${advance > 0 ? `
          <div class="fin-row fin-advance"><span class="fl">Advance Paid</span><span class="fv">- ₹${advance.toLocaleString('en-IN')}</span></div>
          <div class="fin-row fin-remaining"><span class="fl">Remaining to Collect</span><span class="fv">₹${remaining.toLocaleString('en-IN')}</span></div>
          ` : ''}
        </div>

        <hr class="sec-sep">

        <!-- Payment Details -->
        <div class="sec-lbl">💳 Payment Details</div>
        <div class="pay-rows">
          <div class="pay-row"><span class="pl">Payment Type</span><span class="pv">${payType}</span></div>
          <div class="pay-row"><span class="pl">Payment Status</span>
            <span class="pv"><span class="pay-chip ${payChipClass(payStatus)}">${payStatus}</span></span>
          </div>
          ${upi ? `<div class="pay-row"><span class="pl">UPI Method</span><span class="pv">${upi}</span></div>` : ''}
          ${utr ? `<div class="pay-row"><span class="pl">UTR / Transaction ID</span><span class="pv mono" style="font-family:monospace">${utr}</span></div>` : ''}
        </div>

        <hr class="sec-sep">

        <!-- Status Management -->
        <div class="sec-lbl">⚙️ Update Status</div>
        <select class="status-select" onchange="updateStatus('${id}', this.value, ${idx})">
          ${STATUSES.map(s => `<option value="${s}"${s === status ? ' selected' : ''}>${s}</option>`).join('')}
        </select>

        <!-- Action Buttons -->
        <div class="action-row">
          <a class="act-btn act-call" href="tel:${phone}">
            📞 Call Customer
          </a>
          <button class="act-btn act-copy" onclick="copyDetails('${safeData}')">
            📋 Copy Details
          </button>
          <button class="act-btn act-pdf" onclick="downloadPDF('${safeData}')">
            📄 Download Invoice
          </button>
          <button class="act-btn act-print" onclick="printInvoice('${safeData}')">
            🖨️ Print Invoice
          </button>
          ${status !== 'Delivered' && status !== 'Cancelled' ? `
          <button class="act-btn act-deliver" onclick="markDelivered('${id}', ${idx})">
            ✅ Mark Delivered
          </button>` : ''}
        </div>

      </div><!-- /.card-inner -->
    </div><!-- /.card-body -->
  </div>`;
}

/* ══════════════════════════════════════
   ACCORDION TOGGLE
══════════════════════════════════════ */
window.toggleCard = (idx) => {
  const body   = document.getElementById(`cb-${idx}`);
  const head   = document.getElementById(`ch-${idx}`);
  const toggle = document.getElementById(`ct-${idx}`);
  const label  = document.getElementById(`ct-label-${idx}`);
  const isOpen = body.classList.contains('open');

  body.classList.toggle('open', !isOpen);
  head.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
  label.textContent = isOpen ? 'View Full Order' : 'Collapse Order';
};

/* ══════════════════════════════════════
   UPDATE STATUS
══════════════════════════════════════ */
window.updateStatus = async (orderId, status, idx) => {
  const docId = docIdMap[orderId];
  if (!docId) { showToast('Order not found in DB'); return; }
  try {
    const updates = { status };
    if (status === 'Delivered') updates.deliveredAt = new Date().toISOString();
    await updateDoc(doc(db, 'orders', docId), updates);
    // allOrders updated via onSnapshot – no manual patch needed
    showToast(`✅ ${orderId} → ${status}`);
  } catch (e) {
    console.error(e);
    showToast('❌ Failed to update status');
  }
};

/* ══════════════════════════════════════
   MARK DELIVERED (quick action)
══════════════════════════════════════ */
window.markDelivered = async (orderId, idx) => {
  await window.updateStatus(orderId, 'Delivered', idx);
};

/* ══════════════════════════════════════
   DOWNLOAD PDF
══════════════════════════════════════ */
window.downloadPDF = async (safeData) => {
  try {
    const o = JSON.parse(decodeURIComponent(safeData));
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210, pad = 18;
    let y = pad;

    /* ── Orange header ── */
    doc.setFillColor(255, 107, 0);
    doc.rect(0, 0, W, 48, 'F');

    // Try to embed logo.png if available
    try {
      const imgEl = new Image();
      imgEl.src = 'logo.png';
      await new Promise((res) => { imgEl.onload = res; imgEl.onerror = res; setTimeout(res, 400); });
      if (imgEl.complete && imgEl.naturalWidth > 0) {
        const canvas = document.createElement('canvas');
        canvas.width = imgEl.naturalWidth; canvas.height = imgEl.naturalHeight;
        canvas.getContext('2d').drawImage(imgEl, 0, 0);
        const imgData = canvas.toDataURL('image/png');
        // Draw logo scaled to ~28px height
        const ratio = imgEl.naturalWidth / imgEl.naturalHeight;
        const lh = 10, lw = lh * ratio;
        doc.addImage(imgData, 'PNG', pad, 8, lw, lh);
      }
    } catch (_) { /* logo not available, skip */ }

    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(20);
    doc.text('KashRun', pad, 24);
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.text('Food at Your Doorstep – Kulgam District', pad, 32);
    doc.text('kashrun.in@gmail.com', pad, 40);
    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.text('RESTAURANT INVOICE', W - pad, 22, { align: 'right' });
    doc.setFontSize(9.5);
    doc.text(o.orderId || '—', W - pad, 31, { align: 'right' });
    doc.setFontSize(8.5);
    doc.setFont('helvetica', 'normal');
    doc.text(fmtDate(o.createdAt), W - pad, 40, { align: 'right' });
    y = 62;

    const pr = () => { doc.setTextColor(255, 107, 0); };
    const dk = () => { doc.setTextColor(15, 23, 42); };
    const gr = () => { doc.setTextColor(100, 116, 139); };
    const line = () => { doc.setDrawColor(226, 232, 240); doc.line(pad, y - 2, W - pad, y - 2); };

    const secHead = (t) => {
      pr(); doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.text(t, pad, y);
      dk(); y += 5; line(); y += 5;
    };

    const kv = (label, val, bold = false) => {
      gr(); doc.setFontSize(8.5); doc.setFont('helvetica', 'bold');
      doc.text(label + ':', pad, y);
      dk(); doc.setFont('helvetica', bold ? 'bold' : 'normal');
      const lines = doc.splitTextToSize(String(val || '—'), W - pad - 72);
      doc.text(lines, 72, y);
      y += 7 * lines.length;
    };

    /* ── Order & Customer ── */
    secHead('ORDER INFORMATION');
    kv('Order ID',      o.orderId, true);
    kv('Order Date',    fmtDate(o.createdAt));
    kv('Status',        o.status || '—', true);
    y += 4;

    secHead('CUSTOMER DETAILS');
    kv('Customer Name', o.customerName || '—');
    kv('Primary Phone', o.phoneNumber  || '—');
    kv('Alt. Phone',    o.alternatePhone || o.altPhoneNumber || o.altPhone || '—');
    y += 4;

    secHead('DELIVERY ADDRESS');
    const addr = [o.houseNumber, o.street, o.village, o.landmark, o.pincode].filter(Boolean).join(', ');
    const addrLines = doc.splitTextToSize(addr || '—', W - 2 * pad);
    dk(); doc.setFont('helvetica', 'normal'); doc.setFontSize(9);
    doc.text(addrLines, pad, y);
    y += 7 * addrLines.length + 4;

    if (o.specialInstructions) {
      doc.setFillColor(254, 243, 199);
      doc.rect(pad, y - 3, W - 2 * pad, 12, 'F');
      doc.setTextColor(146, 64, 14);
      doc.setFontSize(8.5);
      doc.text('Note: ' + o.specialInstructions, pad + 3, y + 4);
      y += 16;
    }

    y += 4;
    secHead('ITEMS ORDERED');

    /* Items table header */
    doc.setFillColor(241, 245, 249);
    doc.rect(pad, y - 3, W - 2 * pad, 8, 'F');
    gr(); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
    doc.text('Item', pad + 2, y + 2);
    doc.text('Size', 100, y + 2);
    doc.text('Qty', 135, y + 2);
    doc.text('Price', W - pad - 2, y + 2, { align: 'right' });
    y += 10;

    dk(); doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
    (o.items || []).forEach(it => {
      doc.text(String(it.name || '—').substring(0, 32), pad + 2, y);
      doc.text(String(it.selectedSize || '—'), 100, y);
      doc.text(String(it.quantity || 1), 135, y);
      doc.text('₹' + ((it.price || 0) * (it.quantity || 1)).toLocaleString('en-IN'), W - pad - 2, y, { align: 'right' });
      y += 7;
    });
    y += 6;

    /* ── Financial ── */
    secHead('FINANCIAL SUMMARY');
    const subtotal  = Number(o.subtotal || o.itemsTotal || 0);
    const delivFee  = Number(o.deliveryFee || o.deliveryCharge || 0);
    const tax       = Number(o.tax || 0);
    const grand     = Number(o.totalAmount || o.grandTotal || (subtotal + delivFee + tax));
    const advance   = Number(o.advancePaid || 0);
    const remaining = Math.max(grand - advance, 0);

    const finRow = (lbl, val, isTotal = false, isPrimary = false) => {
      if (isTotal) {
        doc.setDrawColor(226, 232, 240);
        doc.line(pad, y - 2, W - pad, y - 2);
      }
      gr(); doc.setFontSize(isTotal ? 9 : 8.5); doc.setFont('helvetica', isTotal ? 'bold' : 'normal');
      doc.text(lbl, pad, y);
      if (isPrimary) pr(); else dk();
      doc.setFont('helvetica', isTotal ? 'bold' : 'normal');
      doc.text(val, W - pad, y, { align: 'right' });
      dk();
      y += 7;
    };

    finRow('Subtotal', '₹' + subtotal.toLocaleString('en-IN'));
    finRow('Delivery Fee', '₹' + delivFee.toLocaleString('en-IN'));
    if (tax > 0) finRow('Tax', '₹' + tax.toLocaleString('en-IN'));
    finRow('Grand Total', '₹' + grand.toLocaleString('en-IN'), true, true);
    if (advance > 0) {
      finRow('Advance Paid', '- ₹' + advance.toLocaleString('en-IN'));
      finRow('Remaining to Collect', '₹' + remaining.toLocaleString('en-IN'));
    }
    y += 4;

    /* ── Payment ── */
    secHead('PAYMENT DETAILS');
    kv('Payment Type',   o.paymentType   || '—');
    kv('Payment Status', o.paymentStatus || '—');
    if (o.selectedUPI || o.upiMethod) kv('UPI Method', o.selectedUPI || o.upiMethod);
    if (o.utrNumber || o.utr) kv('UTR / Transaction ID', o.utrNumber || o.utr);

    /* ── Footer ── */
    const pageH = 297;
    doc.setFillColor(248, 250, 252);
    doc.rect(0, pageH - 22, W, 22, 'F');
    doc.setDrawColor(226, 232, 240);
    doc.line(0, pageH - 22, W, pageH - 22);
    gr(); doc.setFontSize(8.5); doc.setFont('helvetica', 'bold');
    doc.text('KashRun – Food at Your Doorstep', W / 2, pageH - 12, { align: 'center' });
    doc.setFont('helvetica', 'normal');
    doc.text('System-generated invoice  |  KashRun', W / 2, pageH - 5, { align: 'center' });

    doc.save(`${o.orderId || 'KashRun'}-Restaurant-Invoice.pdf`);
    showToast('📄 Invoice downloaded!');
  } catch (err) {
    console.error('PDF error:', err);
    showToast('⚠️ PDF generation failed');
  }
};

/* ══════════════════════════════════════
   PRINT INVOICE
══════════════════════════════════════ */
window.printInvoice = (safeData) => {
  try {
    const o = JSON.parse(decodeURIComponent(safeData));
    const addr = fullAddress(o);
    const grand     = Number(o.totalAmount || o.grandTotal || 0);
    const subtotal  = Number(o.subtotal    || o.itemsTotal || 0);
    const delivFee  = Number(o.deliveryFee || 0);
    const tax       = Number(o.tax || 0);
    const advance   = Number(o.advancePaid || 0);
    const remaining = Math.max(grand - advance, 0);

    const itemsHtml = (o.items || []).map(i => `
      <tr>
        <td>${i.name || '—'}${i.selectedSize ? ` <em>(${i.selectedSize})</em>` : ''}</td>
        <td style="text-align:center">×${i.quantity || 1}</td>

    const html = `

        body{font-family:Arial,sans-serif;font-size:11px;color:#0F172A;padding:24px 32px}
        .hdr{background:#FF6B00;color:#fff;padding:16px 20px;border-radius:8px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
        .hdr-left h1{font-size:20px;font-weight:900;margin-bottom:2px}
        .hdr-left p{font-size:10px;opacity:.85}
        .hdr-right{text-align:right}
        .hdr-right .oid{font-size:15px;font-weight:900}
        .hdr-right .inv{font-size:10px;opacity:.85}
        .section{margin-bottom:16px}
        .section h3{font-size:10px;font-weight:800;color:#FF6B00;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid #E2E8F0;padding-bottom:5px;margin-bottom:10px}
        .kv{display:flex;gap:8px;margin-bottom:5px}
        .kv .k{font-weight:700;color:#475569;width:120px;flex-shrink:0}
        .kv .v{font-weight:600;color:#0F172A}
        table{width:100%;border-collapse:collapse;font-size:11px}
        th{text-align:left;font-weight:800;color:#475569;font-size:10px;text-transform:uppercase;padding:6px 8px;background:#F8FAFC}
        td{padding:7px 8px;border-bottom:1px solid #F1F5F9}
        .fin{display:flex;justify-content:flex-end}
        .fin-table{width:240px}
        .fin-table tr td{border-bottom:none;padding:4px 6px}
        .fin-table .total{font-weight:900;color:#FF6B00;border-top:2px solid #E2E8F0}
        .addr-box{background:#F8FAFC;border-left:3px solid #FF6B00;padding:10px 14px;border-radius:4px;font-size:11px;line-height:1.7}
        .footer{text-align:center;margin-top:20px;padding-top:12px;border-top:1px solid #E2E8F0;font-size:10px;color:#94A3B8}
        .note-box{background:#FEF3C7;border-radius:4px;padding:8px 12px;font-size:10px;color:#92400E;margin-top:10px}
      </style>
      <div class="hdr">
        <div class="hdr-left">
          <h1>🍽️ KashRun</h1>
          <p>Food at Your Doorstep – Kulgam District</p>
        </div>
        <div class="hdr-right">
          <div class="inv">RESTAURANT INVOICE</div>
          <div class="oid">${o.orderId || '—'}</div>
          <div style="font-size:10px;opacity:.85">${fmtDate(o.createdAt)}</div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div class="section">

          <div class="kv"><span class="k">Phone</span><span class="v">${o.phoneNumber || '—'}</span></div>
          ${(o.alternatePhone || o.altPhoneNumber || o.altPhone) ? `<div class="kv"><span class="k">Alt. Phone</span><span class="v">${o.alternatePhone || o.altPhoneNumber || o.altPhone}</span></div>` : ''}
          <div class="kv"><span class="k">Status</span><span class="v">${o.status || '—'}</span></div>
        </div>
        <div class="section">
          <h3>Delivery Address</h3>
          <div class="addr-box">${addr}</div>
          ${o.specialInstructions ? `<div class="note-box">📝 ${o.specialInstructions}</div>` : ''}

      <div class="section">

          <div class="fin">
            <table class="fin-table">

              <tr><td>Delivery Fee</td><td style="text-align:right">₹${delivFee.toLocaleString('en-IN')}</td></tr>
              ${tax > 0 ? `<tr><td>Tax</td><td style="text-align:right">₹${tax.toLocaleString('en-IN')}</td></tr>` : ''}

              <tr><td><strong>To Collect</strong></td><td style="text-align:right;color:#F59E0B"><strong>₹${remaining.toLocaleString('en-IN')}</strong></td></tr>

        </div>
      </div>

      <div class="footer">
        <strong>KashRun – Food at Your Doorstep</strong> &nbsp;|&nbsp; Kulgam District &nbsp;|&nbsp; This is a system-generated invoice.
      </div>
    `;

    const printArea = document.getElementById('printArea');
    printArea.innerHTML = html;
    printArea.style.display = 'block';
    setTimeout(() => {
      window.print();
      printArea.style.display = 'none';
      printArea.innerHTML = '';
    }, 150);
  } catch (e) {
    console.error(e);
    showToast('⚠️ Print failed');

/* ══════════════════════════════════════
   EXPORT CSV
══════════════════════════════════════ */
window.exportCSV = () => {
  if (!allOrders.length) { showToast('No orders to export'); return; }
  const headers = [
    'Order ID','Customer Name','Phone','Alt Phone',
    'House No','Street','Village','Landmark','Pincode',
    'Items','Subtotal','Delivery Fee','Tax','Grand Total',
    'Advance Paid','Remaining','Payment Type','Payment Status','UTR',
    'Status','Order Date'
  ];
  const rows = allOrders.map(o => {
    const items = (o.items || []).map(i => `${i.name}×${i.quantity}`).join(' | ');
    const grand = Number(o.totalAmount || 0);
    const advance = Number(o.advancePaid || 0);
    return [
      o.orderId, o.customerName, o.phoneNumber, (o.alternatePhone || o.altPhoneNumber || o.altPhone || ''),
      o.houseNumber, o.street, o.village, o.landmark, o.pincode,
      items,
      o.subtotal || 0, o.deliveryFee || 0, o.tax || 0, grand,
      advance, Math.max(grand - advance, 0),
      o.paymentType, o.paymentStatus, o.utrNumber || o.utr,
      o.status,
      o.createdAt ? new Date(o.createdAt).toLocaleDateString('en-IN') : ''
    ].map(v => `"${String(v || '').replace(/"/g, '""')}"`).join(',');
  });
  const csv = [headers.map(h => `"${h}"`).join(','), ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = `kashrun-orders-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('📥 CSV exported!');
};

   DARK MODE
══════════════════════════════════════ */
window.toggleDark = () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  document.getElementById('darkBtn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
};

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let _tt;
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 3000);
};

/* Helper exposed globally for print/pdf closures */
window._fmtDate  = fmtDate;
window._fullAddr = fullAddress;
