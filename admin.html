<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – KashRun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--primary:#FF6B00;--primary-dark:#e55d00;--dark:#0F172A;--white:#fff;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--radius:12px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1)}
  body{font-family:'Inter',sans-serif;background:#F1F5F9;color:var(--dark);min-height:100vh}
  body.dark{background:#0a0f1a;color:#e2e8f0}
  body.dark .card,body.dark .navbar,body.dark .table-wrap,body.dark input,body.dark select{background:#1e293b;color:#e2e8f0;border-color:#334155}
  body.dark .stat-card{background:#1e293b}
  body.dark table thead{background:#0F172A}
  body.dark tr:hover{background:#243047!important}
  body.dark .badge{filter:brightness(1.2)}

  /* ACCESS SCREEN */
  #accessScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0F172A 0%,#1e2d45 100%);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:20px;padding:20px}
  #accessScreen .box{background:#fff;border-radius:20px;padding:40px 36px;text-align:center;max-width:380px;width:100%}
  #accessScreen .logo{font-size:1.6rem;font-weight:900;color:var(--primary);margin-bottom:4px}
  #accessScreen p{color:var(--gray-600);font-size:.9rem;margin-bottom:24px}
  #accessScreen input{width:100%;padding:13px 16px;border:2px solid var(--gray-200);border-radius:10px;font-size:1rem;text-align:center;letter-spacing:3px;font-weight:700;outline:none;transition:border .2s;font-family:'Inter',sans-serif}
  #accessScreen input:focus{border-color:var(--primary)}
  #accessScreen button{width:100%;margin-top:12px;background:var(--primary);color:#fff;border:none;border-radius:50px;padding:13px;font-size:1rem;font-weight:700;cursor:pointer;transition:.2s}
  #accessScreen button:hover{background:var(--primary-dark)}
  #accessError{color:#EF4444;font-size:.88rem;margin-top:8px;display:none}

  /* NAVBAR */
  .navbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:60px}
  .nav-brand{font-weight:800;font-size:1.1rem;color:var(--primary);display:flex;align-items:center;gap:8px}
  .nav-right{display:flex;align-items:center;gap:12px}
  .dark-toggle{background:var(--gray-100);border:none;border-radius:50px;padding:7px 14px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
  .dark-toggle:hover{background:var(--gray-200)}
  .refresh-btn{background:var(--primary);color:#fff;border:none;border-radius:50px;padding:7px 16px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
  .refresh-btn:hover{background:var(--primary-dark)}

  /* LAYOUT */
  .main{padding:28px 5%;max-width:1400px;margin:0 auto}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
  .stat-card{background:#fff;border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:16px}
  .stat-icon{font-size:2rem;width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center}
  .stat-icon.orange{background:rgba(255,107,0,.1)}
  .stat-icon.yellow{background:rgba(245,158,11,.1)}
  .stat-icon.green{background:rgba(34,197,94,.1)}
  .stat-icon.blue{background:rgba(59,130,246,.1)}
  .stat-info .num{font-size:1.6rem;font-weight:800}
  .stat-info .label{font-size:.78rem;color:var(--gray-400);font-weight:500;margin-top:2px}
  /* FILTERS */
  .toolbar{background:#fff;border-radius:var(--radius);padding:16px 20px;box-shadow:var(--shadow-sm);display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:20px}
  .search-input{flex:1;min-width:200px;padding:9px 14px;border:2px solid var(--gray-200);border-radius:50px;font-size:.88rem;font-family:'Inter',sans-serif;outline:none;transition:border .2s}
  .search-input:focus{border-color:var(--primary)}
  .filter-group{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{padding:7px 14px;border-radius:50px;border:2px solid var(--gray-200);background:#fff;font-size:.78rem;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
  .filter-btn.active,.filter-btn:hover{border-color:var(--primary);background:var(--primary);color:#fff}
  .export-btn{background:#fff;border:2px solid var(--gray-200);border-radius:50px;padding:7px 14px;font-size:.78rem;font-weight:600;cursor:pointer;transition:.2s}
  .export-btn:hover{border-color:var(--dark)}
  /* TABLE */
  .table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  thead{background:var(--gray-50)}
  th{padding:12px 14px;text-align:left;font-weight:700;color:var(--gray-600);white-space:nowrap;border-bottom:2px solid var(--gray-100)}
  td{padding:12px 14px;border-bottom:1px solid var(--gray-100);vertical-align:top}
  tr:hover{background:var(--gray-50)}
  .badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .badge.Pending{background:#FEF3C7;color:#D97706}
  .badge.Confirmed{background:#DBEAFE;color:#1D4ED8}
  .badge.Preparing{background:#EDE9FE;color:#7C3AED}
  .badge.OutForDelivery,.badge["Out For Delivery"]{background:#DCFCE7;color:#16A34A}
  .badge.Delivered{background:#D1FAE5;color:#065F46}
  .badge.Cancelled{background:#FEE2E2;color:#DC2626}
  .status-select{padding:5px 10px;border:1.5px solid var(--gray-200);border-radius:8px;font-size:.78rem;font-family:'Inter',sans-serif;cursor:pointer;outline:none;background:#fff;transition:border .2s}
  .status-select:focus{border-color:var(--primary)}
  .action-btn{background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 6px;border-radius:6px;transition:background .15s;display:inline-flex;align-items:center}
  .action-btn:hover{background:var(--gray-100)}
  .items-list{max-width:200px;line-height:1.5}
  .items-list span{display:block;font-size:.78rem;color:var(--gray-600)}
  .no-orders{text-align:center;padding:48px;color:var(--gray-400)}
  /* SKELETON */
  .skeleton{background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;height:14px}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:50px;font-size:.88rem;font-weight:600;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:600px){.main{padding:16px}}
</style>
</head>
<body>

<!-- ACCESS SCREEN -->
<div id="accessScreen">
  <div class="box">
    <div class="logo">🔐 KashRun Admin</div>
    <p>Enter your admin access code to continue</p>
    <input type="password" id="accessInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')checkAccess()">
    <div id="accessError">❌ Access Denied. Incorrect code.</div>
    <button onclick="checkAccess()">Unlock Dashboard</button>
  </div>
</div>

<!-- DASHBOARD (hidden until access) -->
<div id="dashboard" style="display:none">
  <nav class="navbar">
    <div class="nav-brand">🍽️ KashRun Admin</div>
    <div class="nav-right">
      <button class="dark-toggle" onclick="toggleDark()">🌙 Dark</button>
      <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh</button>
      <a href="index.html" style="font-size:.82rem;color:var(--gray-600);text-decoration:none">← Site</a>
    </div>
  </nav>

  <div class="main">
    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon orange">📋</div><div class="stat-info"><div class="num" id="statTotal">-</div><div class="label">Total Orders</div></div></div>
      <div class="stat-card"><div class="stat-icon yellow">⏳</div><div class="stat-info"><div class="num" id="statPending">-</div><div class="label">Pending</div></div></div>
      <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="num" id="statDelivered">-</div><div class="label">Delivered</div></div></div>
      <div class="stat-card"><div class="stat-icon blue">💰</div><div class="stat-info"><div class="num" id="statRevenue">-</div><div class="label">Total Revenue</div></div></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by Order ID, Name, Phone..." oninput="filterOrders()">
      <div class="filter-group" id="filterGroup">
        <button class="filter-btn active" onclick="setFilter('All',this)">All</button>
        <button class="filter-btn" onclick="setFilter('Pending',this)">Pending</button>
        <button class="filter-btn" onclick="setFilter('Confirmed',this)">Confirmed</button>
        <button class="filter-btn" onclick="setFilter('Preparing',this)">Preparing</button>
        <button class="filter-btn" onclick="setFilter('Out For Delivery',this)">Out For Delivery</button>
        <button class="filter-btn" onclick="setFilter('Delivered',this)">Delivered</button>
        <button class="filter-btn" onclick="setFilter('Cancelled',this)">Cancelled</button>
      </div>
      <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Order ID</th><th>Customer</th><th>Phone</th><th>Address</th><th>Items</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyDvViMeJbOdLvNT1163vlp7fPIXK6qJ8Qk",authDomain:"kashrun-6ac6a.firebaseapp.com",projectId:"kashrun-6ac6a",storageBucket:"kashrun-6ac6a.firebasestorage.app",messagingSenderId:"466142826836",appId:"1:466142826836:web:8fbcd0a829d582429ff8c1"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let allOrders=[];
let docIdMap={};
let currentFilter='All';

window.checkAccess=()=>{
  const code=document.getElementById('accessInput').value.trim();
  if(code==='KASHRUN2026'){
    document.getElementById('accessScreen').style.display='none';
    document.getElementById('dashboard').style.display='block';
    loadOrders();
  }else{
    document.getElementById('accessError').style.display='block';
    setTimeout(()=>{document.getElementById('accessError').style.display='none';},3000);
  }
};

window.loadOrders=async()=>{
  showSkeleton();
  try{
    const snap=await getDocs(collection(db,'orders'));
    allOrders=[];docIdMap={};
    snap.forEach(d=>{allOrders.push({...d.data(),_docId:d.id});docIdMap[d.data().orderId]=d.id;});
    allOrders.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    updateStats();filterOrders();
  }catch(e){showToast('Failed to load orders. Check connection.');console.error(e);}
};

function updateStats(){
  const total=allOrders.length;
  const pending=allOrders.filter(o=>o.status==='Pending').length;
  const delivered=allOrders.filter(o=>o.status==='Delivered').length;
  const revenue=allOrders.filter(o=>o.status==='Delivered').reduce((s,o)=>s+(o.totalAmount||0),0);
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statPending').textContent=pending;
  document.getElementById('statDelivered').textContent=delivered;
  document.getElementById('statRevenue').textContent='₹'+revenue;
}

function showSkeleton(){
  const rows=Array(5).fill(0).map(()=>`<tr>${Array(9).fill('<td><div class="skeleton"></div></td>').join('')}</tr>`).join('');
  document.getElementById('ordersBody').innerHTML=rows;
}

window.filterOrders=()=>{
  const q=(document.getElementById('searchInput').value||'').toLowerCase();
  let list=allOrders;
  if(currentFilter!=='All')list=list.filter(o=>o.status===currentFilter);
  if(q)list=list.filter(o=>(o.orderId||'').toLowerCase().includes(q)||(o.customerName||'').toLowerCase().includes(q)||(o.phoneNumber||'').includes(q));
  renderTable(list);
};

window.setFilter=(f,btn)=>{
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterOrders();
};

function renderTable(list){
  const tbody=document.getElementById('ordersBody');
  if(!list.length){tbody.innerHTML=`<tr><td colspan="9" class="no-orders">No orders found.</td></tr>`;return;}
  const STATUSES=['Pending','Confirmed','Preparing','Out For Delivery','Delivered','Cancelled'];
  tbody.innerHTML=list.map(o=>{
    const addr=[o.houseNumber,o.street,o.village,o.landmark,o.pincode].filter(Boolean).join(', ');
    const items=(o.items||[]).map(i=>`<span>${i.name}${i.selectedSize?' ('+i.selectedSize+')':''} ×${i.quantity}</span>`).join('');
    const date=o.createdAt?new Date(o.createdAt).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
    const badgeClass=o.status?o.status.replace(/\s+/g,''):'Pending';
    return `<tr>
      <td><strong>${o.orderId||'—'}</strong></td>
      <td>${o.customerName||'—'}</td>
      <td>${o.phoneNumber||'—'}</td>
      <td style="max-width:160px;font-size:.78rem">${addr||'—'}</td>
      <td><div class="items-list">${items||'—'}</div></td>
      <td><strong>₹${o.totalAmount||0}</strong></td>
      <td style="white-space:nowrap;font-size:.78rem">${date}</td>
      <td>
        <select class="status-select" onchange="updateStatus('${o.orderId}',this.value)">
          ${STATUSES.map(s=>`<option value="${s}"${s===o.status?' selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td>
        <button class="action-btn" onclick="copyDetails('${o.customerName||''}','${o.phoneNumber||''}','${addr.replace(/'/g,"")}')" title="Copy details">📋</button>
        <a class="action-btn" href="tel:${o.phoneNumber}" title="Call">📞</a>
      </td>
    </tr>`;
  }).join('');
}

window.updateStatus=async(orderId,status)=>{
  const docId=docIdMap[orderId];if(!docId)return;
  try{
    await updateDoc(doc(db,'orders',docId),{status});
    const o=allOrders.find(o=>o.orderId===orderId);if(o)o.status=status;
    updateStats();showToast('✅ Status updated to '+status);
  }catch(e){showToast('Failed to update status');console.error(e);}
};

window.copyDetails=(name,phone,addr)=>{
  navigator.clipboard.writeText(`Name: ${name}\nPhone: ${phone}\nAddress: ${addr}`).then(()=>showToast('📋 Details copied!'));
};

window.exportCSV=()=>{
  if(!allOrders.length){showToast('No orders to export');return;}
  const headers=['Order ID','Customer','Phone','Village','Amount','Status','Date'];
  const rows=allOrders.map(o=>[o.orderId,o.customerName,o.phoneNumber,o.village,o.totalAmount,o.status,o.createdAt?new Date(o.createdAt).toLocaleDateString('en-IN'):''].map(v=>`"${v||''}"`).join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='kashrun-orders-'+Date.now()+'.csv';a.click();
  showToast('📥 CSV exported!');
};

window.toggleDark=()=>{
  document.body.classList.toggle('dark');
  document.querySelector('.dark-toggle').textContent=document.body.classList.contains('dark')?'☀️ Light':'🌙 Dark';
};

let toastTimer;
window.showToast=(msg)=>{
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
};
</script>
</body>
</html>
