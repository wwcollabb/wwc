<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Orders — Worldwide Collab</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080810; --surface: #0f0f1a; --surface2: #161624; --surface3: #1c1c2e;
      --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1); --border3: rgba(255,255,255,0.16);
      --accent: #6366f1; --accent2: #a78bfa; --accent3: #818cf8;
      --gold: #fbbf24; --green: #10b981; --green2: #34d399; --red: #f87171; --blue: #60a5fa;
      --text: #f1f5f9; --text2: #cbd5e1; --muted: #64748b;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); position: relative; overflow-x: hidden; }
    .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .ambient::before { content: ''; position: absolute; top: -200px; left: 30%; width: 700px; height: 700px; background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 65%); }
    .ambient::after { content: ''; position: absolute; bottom: -100px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 65%); }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

    /* NAV */
    .nav { position: sticky; top: 0; z-index: 100; background: rgba(8,8,16,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border2); padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo { width: 32px; height: 32px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .nav-name { font-size: 15px; font-weight: 800; color: var(--text); }
    .nav-name span { background: linear-gradient(135deg, var(--accent3), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 7px 14px; font-size: 13px; color: var(--text2); }
    .nav-avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
    .refresh-btn { background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 10px; padding: 7px 14px; color: var(--accent3); font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Outfit',sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
    .refresh-btn:hover { background: rgba(99,102,241,0.25); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

    /* MAIN */
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; position: relative; z-index: 1; }

    /* WELCOME */
    .welcome-bar { margin-bottom: 32px; }
    .welcome-bar h1 { font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
    .welcome-bar h1 span { background: linear-gradient(135deg, var(--accent3), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome-bar p { font-size: 14px; color: var(--muted); margin-top: 6px; }

    /* STATS ROW */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; }
    .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .stat-info { min-width: 0; }
    .stat-num { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* LOADING STATE */
    .loader-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
    .loader-ring { width: 48px; height: 48px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .loader-text { font-size: 14px; color: var(--muted); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; color: var(--muted); }

    /* ORDERS LIST */
    .orders-section h2 { font-size: 16px; font-weight: 700; color: var(--text2); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .orders-section h2 .count-badge { background: rgba(99,102,241,0.2); color: var(--accent3); font-size: 11px; padding: 2px 8px; border-radius: 20px; }

    /* ORDER CARD */
    .order-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 18px; margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s; }
    .order-card:hover { border-color: var(--border3); box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    .order-card.highlighted { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 0 1px rgba(99,102,241,0.2), 0 8px 32px rgba(99,102,241,0.15); }

    /* CARD MAIN ROW */
    .card-row { display: grid; grid-template-columns: 160px 1fr 1fr 90px 120px 48px; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; min-width: 0; }
    .cr-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cr-platform { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .platform-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
    .platform-name { font-size: 13px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cr-service { font-size: 12px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .cr-amount { font-size: 14px; font-weight: 800; color: var(--text); white-space: nowrap; }
    .cr-status { display: flex; align-items: center; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 20px; white-space: nowrap; }
    .status-pending { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .status-processing { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
    .status-completed { background: rgba(52,211,153,0.15); color: #34d399; border: 1px solid rgba(52,211,153,0.3); }
    .status-cancelled { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
    .expand-btn { width: 32px; height: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: all 0.2s; }
    .order-card.open .expand-btn { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.3); color: var(--accent3); transform: rotate(180deg); }

    /* PROGRESS BAR INSIDE ROW */
    .progress-mini { margin: 0 20px 14px; }
    .progress-track { height: 4px; background: var(--surface3); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s ease; }

    /* EXPANDED DETAILS */
    .order-details { border-top: 1px solid var(--border); padding: 20px; display: none; animation: slideDown 0.25s ease; }
    .order-card.open .order-details { display: block; }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    .details-grid2 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .dg-cell { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
    .dg-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
    .dg-value { font-size: 13px; font-weight: 600; color: var(--text2); word-break: break-all; }

    /* TIMELINE */
    .timeline-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 14px; }
    .timeline { display: flex; gap: 0; position: relative; }
    .timeline::before { content: ''; position: absolute; top: 16px; left: 0; right: 0; height: 2px; background: var(--surface3); z-index: 0; }
    .tl-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; z-index: 1; }
    .tl-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 2px solid var(--surface3); background: var(--surface2); transition: all 0.3s; }
    .tl-dot.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: var(--accent); box-shadow: 0 0 16px rgba(99,102,241,0.5); }
    .tl-dot.done { background: rgba(52,211,153,0.2); border-color: var(--green2); }
    .tl-label { font-size: 11px; color: var(--muted); font-weight: 600; text-align: center; }
    .tl-label.active { color: var(--text); }

    .progress-full-bar { margin-top: 20px; }
    .pfb-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
    .pfb-label { color: var(--muted); font-weight: 600; }
    .pfb-pct { color: var(--accent2); font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .pfb-track { height: 10px; background: var(--surface3); border-radius: 10px; overflow: hidden; }
    .pfb-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.8s ease; }

    .notes-box { margin-top: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 13px; color: var(--text2); }
    .notes-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .card-row { grid-template-columns: 1fr 80px 32px; gap: 8px; padding: 14px 16px; }
      .cr-platform, .cr-service, .cr-amount { display: none; }
      .cr-id { font-size: 11px; }
      .details-grid2 { grid-template-columns: 1fr 1fr; }
      .timeline { flex-direction: column; gap: 8px; }
      .timeline::before { display: none; }
      .tl-step { flex-direction: row; justify-content: flex-start; gap: 12px; }
      .tl-dot { flex-shrink: 0; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .details-grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="ambient"></div>

<nav class="nav">
  <a href="index.html" class="nav-brand">
    <div class="nav-logo">🌐</div>
    <div class="nav-name">Worldwide <span>Collab</span></div>
  </a>
  <div class="nav-right">
    <div class="nav-user">
      <div class="nav-avatar" id="navAvatar">?</div>
      <span id="navUserName">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="loadOrders()" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Refresh
    </button>
  </div>
</nav>

<main class="main">
  <div class="welcome-bar">
    <h1>Welcome, <span id="welcomeName">—</span></h1>
    <p id="welcomeSub">Loading your orders...</p>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(99,102,241,0.15);">📦</div>
      <div class="stat-info"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total Orders</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(251,191,36,0.15);">⏳</div>
      <div class="stat-info"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(96,165,250,0.15);">⚡</div>
      <div class="stat-info"><div class="stat-num" id="statProcessing">—</div><div class="stat-label">Processing</div></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(52,211,153,0.15);">✅</div>
      <div class="stat-info"><div class="stat-num" id="statCompleted">—</div><div class="stat-label">Completed</div></div>
    </div>
  </div>

  <div id="mainContent">
    <div class="loader-wrap" id="loaderWrap">
      <div class="loader-ring"></div>
      <div class="loader-text">Loading your orders...</div>
    </div>
  </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
  authDomain: "ww-c-5c5c1.firebaseapp.com",
  projectId: "ww-c-5c5c1",
  storageBucket: "ww-c-5c5c1.firebasestorage.app",
  messagingSenderId: "200600278915",
  appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
};
firebase.initializeApp(firebaseConfig);

const SHEETS_API = 'https://script.google.com/macros/s/AKfycbydxFOBsdmISk0Hi4Ep-bsq5wFVGVWlrla6nskNHB3tKS2IuElAsKpqV4nR_YIqmgNvhg/exec';

let currentUser = null;
let allOrders = [];

const platformEmojis = { instagram:'📸', facebook:'👍', youtube:'▶️', twitter:'🐦', tiktok:'🎵', snapchat:'👻', linkedin:'💼', default:'🌐' };
const platformColors = { instagram:'linear-gradient(135deg,#e1306c,#f77737)', facebook:'linear-gradient(135deg,#1877f2,#42a5f5)', youtube:'linear-gradient(135deg,#ff0000,#ff6b35)', twitter:'linear-gradient(135deg,#1da1f2,#0d8ecf)', tiktok:'linear-gradient(135deg,#010101,#ff0050)', default:'linear-gradient(135deg,#6366f1,#a78bfa)' };

firebase.auth().onAuthStateChanged(user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  const name = user.displayName || user.email.split('@')[0];
  document.getElementById('welcomeName').textContent = name;
  document.getElementById('navUserName').textContent = name;
  document.getElementById('navAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('welcomeSub').textContent = `Here are all your recent orders — ${user.email}`;
  loadOrders();
});

async function loadOrders() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  try {
    const url = `${SHEETS_API}?action=getOrders&email=${encodeURIComponent(currentUser.email)}&t=${Date.now()}`;
    const res = await fetch(url);
    const data = await res.json();
    allOrders = Array.isArray(data.orders) ? data.orders : [];
  } catch (e) {
    allOrders = [];
  }

  btn.classList.remove('spinning');
  updateStats();
  renderOrders();
  checkHighlight();
}

function updateStats() {
  const total = allOrders.length;
  const pending = allOrders.filter(o => (o.orderStatus||'').toLowerCase() === 'pending').length;
  const processing = allOrders.filter(o => (o.orderStatus||'').toLowerCase() === 'processing').length;
  const completed = allOrders.filter(o => (o.orderStatus||'').toLowerCase() === 'completed').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statProcessing').textContent = processing;
  document.getElementById('statCompleted').textContent = completed;
}

function renderOrders() {
  const mc = document.getElementById('mainContent');
  if (!allOrders.length) {
    mc.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>No orders yet</h3><p>Once you place an order, it will appear here for tracking.</p></div>`;
    return;
  }
  const sorted = [...allOrders].sort((a,b) => new Date(b.timestamp||0) - new Date(a.timestamp||0));
  mc.innerHTML = `
    <div class="orders-section">
      <h2>Your Orders <span class="count-badge">${sorted.length}</span></h2>
      <div id="ordersList">${sorted.map(renderOrderCard).join('')}</div>
    </div>`;
}

function renderOrderCard(order) {
  const status = (order.orderStatus || 'pending').toLowerCase();
  const progress = parseInt(order.progress) || 0;
  const platform = (order.platform || '').toLowerCase();
  const emoji = platformEmojis[platform] || platformEmojis.default;
  const color = platformColors[platform] || platformColors.default;

  const statusMap = {
    pending: { label: '⏳ Pending', cls: 'status-pending' },
    processing: { label: '⚡ Processing', cls: 'status-processing' },
    completed: { label: '✅ Completed', cls: 'status-completed' },
    cancelled: { label: '❌ Cancelled', cls: 'status-cancelled' }
  };
  const s = statusMap[status] || statusMap.pending;

  const tl = buildTimeline(status, progress);
  const ts = order.timestamp ? new Date(order.timestamp).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }) : '—';

  return `
    <div class="order-card" id="oc_${order.orderId}" onclick="toggleOrder('${order.orderId}')">
      <div class="card-row">
        <div class="cr-id">${order.orderId || '—'}</div>
        <div class="cr-platform">
          <div class="platform-icon" style="background:${color}">${emoji}</div>
          <div class="platform-name">${cap(order.platform)}</div>
        </div>
        <div class="cr-service">${order.service || '—'}</div>
        <div class="cr-amount">₹${order.amount || '0'}</div>
        <div class="cr-status"><span class="status-badge ${s.cls}">${s.label}</span></div>
        <div class="expand-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="progress-mini">
        <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
      </div>
      <div class="order-details">
        <div class="details-grid2">
          <div class="dg-cell"><div class="dg-label">Order ID</div><div class="dg-value" style="font-family:'JetBrains Mono',monospace;font-size:12px;">${order.orderId}</div></div>
          <div class="dg-cell"><div class="dg-label">Platform</div><div class="dg-value">${cap(order.platform)}</div></div>
          <div class="dg-cell"><div class="dg-label">Service</div><div class="dg-value">${order.service || '—'}</div></div>
          <div class="dg-cell"><div class="dg-label">Quantity</div><div class="dg-value">${order.quantity || '—'}</div></div>
          <div class="dg-cell"><div class="dg-label">Amount</div><div class="dg-value" style="color:var(--green2)">₹${order.amount || '0'}</div></div>
          <div class="dg-cell"><div class="dg-label">Date</div><div class="dg-value">${ts}</div></div>
          <div class="dg-cell" style="grid-column:1/-1"><div class="dg-label">Target Link</div><div class="dg-value" style="font-size:11px;">${order.link || '—'}</div></div>
        </div>
        <div class="timeline-title">Order Timeline</div>
        ${tl}
        <div class="progress-full-bar">
          <div class="pfb-header">
            <span class="pfb-label">Delivery Progress</span>
            <span class="pfb-pct">${progress}%</span>
          </div>
          <div class="pfb-track"><div class="pfb-fill" style="width:${progress}%"></div></div>
        </div>
        ${order.notes ? `<div class="notes-box"><div class="notes-label">Admin Notes</div>${order.notes}</div>` : ''}
      </div>
    </div>`;
}

function buildTimeline(status, progress) {
  const steps = [
    { key: 'placed', label: 'Order Placed', icon: '📝' },
    { key: 'pending', label: 'Pending Review', icon: '⏳' },
    { key: 'processing', label: 'Processing', icon: '⚡' },
    { key: 'completed', label: 'Delivered', icon: '✅' }
  ];
  const order = ['placed','pending','processing','completed'];
  const current = status === 'cancelled' ? 'pending' : (order.includes(status) ? status : 'pending');
  const currentIdx = order.indexOf(current);

  return `<div class="timeline">${steps.map((step, i) => {
    const isDone = i < currentIdx;
    const isActive = i === currentIdx;
    return `<div class="tl-step">
      <div class="tl-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}">${isDone ? '✓' : step.icon}</div>
      <div class="tl-label ${isActive ? 'active' : ''}">${step.label}</div>
    </div>`;
  }).join('')}</div>`;
}

function toggleOrder(orderId) {
  const card = document.getElementById('oc_' + orderId);
  if (!card) return;
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.order-card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function checkHighlight() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (id) {
    setTimeout(() => {
      const card = document.getElementById('oc_' + id);
      if (card) {
        card.classList.add('highlighted', 'open');
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }, 300);
  }
}

function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : '—'; }
</script>
