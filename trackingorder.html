<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Worldwide Collab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: contain;
        }

        .brand-info h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 3px;
        }

        .brand-info p {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            background: #f0f0f0;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #555;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .orders-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .section-header {
            padding: 25px 30px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .last-updated {
            font-size: 12px;
            color: #999;
        }

        .orders-list {
            padding: 0;
        }

        .order-item {
            padding: 20px 30px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            transition: background 0.3s;
        }

        .order-item:hover {
            background: #f8f9fa;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-main {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
            min-width: 300px;
        }

        .order-id {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            min-width: 140px;
            text-align: center;
        }

        .order-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .platform-service {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            color: #333;
            font-weight: 600;
        }

        .platform-icon {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .youtube { background: #ff0000; color: white; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); color: white; }
        .facebook { background: #1877f2; color: white; }
        .twitter { background: #1da1f2; color: white; }
        .tiktok { background: #000000; color: white; }

        .order-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .order-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .order-status-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-badge {
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 120px;
            text-align: center;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
            border: 2px solid #ffeaa7;
        }

        .status-processing {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #74b9ff;
            animation: pulse 2s infinite;
        }

        .status-completed {
            background: #d4edda;
            color: #155724;
            border: 2px solid #55efc4;
        }

        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #ff7675;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .order-amount {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
        }

        .loading-state {
            padding: 60px;
            text-align: center;
        }

        .spinner-large {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        .empty-state {
            padding: 60px;
            text-align: center;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #666;
            font-size: 14px;
        }

        .error-state {
            padding: 40px;
            text-align: center;
            background: #fdf2f2;
            margin: 20px;
            border-radius: 10px;
        }

        .error-icon {
            font-size: 40px;
            color: #e74c3c;
            margin-bottom: 15px;
        }

        .login-prompt {
            background: white;
            padding: 60px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            margin: 50px auto;
        }

        .login-prompt h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .login-prompt p {
            color: #666;
            margin-bottom: 25px;
        }

        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .auto-refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #27ae60;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #27ae60;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .order-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .order-main {
                width: 100%;
                flex-direction: column;
                align-items: flex-start;
            }

            .order-status-section {
                width: 100%;
                justify-content: space-between;
            }

            .user-email {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo-section">
                <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
                <div class="brand-info">
                    <h1>My Orders</h1>
                    <p>Worldwide Collab</p>
                </div>
            </div>
            
            <div class="user-section" id="userSection" style="display: none;">
                <div class="auto-refresh-indicator">
                    <span class="live-dot"></span>
                    <span>Live</span>
                </div>
                <span class="user-email" id="userEmail"></span>
                <button class="refresh-btn" onclick="manualRefresh()" id="refreshBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
                    </svg>
                    Refresh
                </button>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Login Prompt -->
        <div class="login-prompt" id="loginPrompt">
            <div class="empty-icon">🔒</div>
            <h2>Please Login First</h2>
            <p>You need to login to view your orders. Your orders are linked to your email address.</p>
            <a href="login.html" class="login-btn">Go to Login</a>
        </div>

        <!-- Dashboard (Hidden until login) -->
        <div id="dashboard" style="display: none;">
            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-number" id="totalOrders">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="pendingOrders">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="processingOrders">0</div>
                    <div class="stat-label">Processing</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedOrders">0</div>
                    <div class="stat-label">Completed</div>
                </div>
            </div>

            <!-- Orders List -->
            <div class="orders-section">
                <div class="section-header">
                    <div class="section-title">
                        <span>📦</span>
                        Recent Orders
                    </div>
                    <span class="last-updated" id="lastUpdated">Last updated: Never</span>
                </div>
                
                <div class="orders-list" id="ordersList">
                    <div class="loading-state">
                        <div class="spinner-large"></div>
                        <p>Loading your orders...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
          // Firebase Config (Same as login.html)
        const firebaseConfig = {
            apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
            authDomain: "ww-c-5c5c1.firebaseapp.com",
            projectId: "ww-c-5c5c1",
            storageBucket: "ww-c-5c5c1.firebasestorage.app",
            messagingSenderId: "200600278915",
            appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // SheetBest API URL
        const SHEET_API = "https://api.sheetbest.com/sheets/62416cad-7c75-4c01-8a76-e526af3d16ba";
        
        let currentUser = null;
        let allOrders = [];
        let refreshInterval;

        // Check Auth State
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginPrompt').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                document.getElementById('userSection').style.display = 'flex';
                document.getElementById('userEmail').textContent = user.email;
                
                loadOrders();
                startAutoRefresh();
            } else {
                document.getElementById('loginPrompt').style.display = 'block';
                document.getElementById('dashboard').style.display = 'none';
                document.getElementById('userSection').style.display = 'none';
                stopAutoRefresh();
            }
        });
              // Load Orders from SheetBest
        async function loadOrders() {
            const ordersList = document.getElementById('ordersList');
            
            try {
                const response = await fetch(SHEET_API);
                const data = await response.json();
                
                // Filter orders by logged in user's email
                const userEmail = currentUser.email.toLowerCase();
                allOrders = data.filter(order => 
                    order.email && order.email.toLowerCase() === userEmail
                );

                // Sort by date (newest first)
                allOrders.sort((a, b) => {
                    const dateA = parseDate(a.date);
                    const dateB = parseDate(b.date);
                    return dateB - dateA;
                });

                updateStats();
                renderOrders();
                updateLastUpdated();
                
            } catch (error) {
                console.error('Error loading orders:', error);
                ordersList.innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">⚠️</div>
                        <h3>Failed to load orders</h3>
                        <p>Please check your internet connection and try again.</p>
                    </div>
                `;
            }
        }

        // Parse date from various formats
        function parseDate(dateStr) {
            if (!dateStr) return new Date(0);
            
            // Try DD-MM-YYYY format
            const parts = dateStr.split('-');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1] - 1, parts[0]);
            }
            
            // Try standard date parsing
            const date = new Date(dateStr);
            return isNaN(date.getTime()) ? new Date(0) : date;
        }

        // Update Statistics
        function updateStats() {
            document.getElementById('totalOrders').textContent = allOrders.length;
            document.getElementById('pendingOrders').textContent = 
                allOrders.filter(o => o.status?.toLowerCase() === 'pending').length;
            document.getElementById('processingOrders').textContent = 
                allOrders.filter(o => o.status?.toLowerCase() === 'processing').length;
            document.getElementById('completedOrders').textContent = 
                allOrders.filter(o => o.status?.toLowerCase() === 'completed').length;
        }

        // Render Orders List
        function renderOrders() {
            const ordersList = document.getElementById('ordersList');
            
            if (allOrders.length === 0) {
                ordersList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <div class="empty-title">No Orders Found</div>
                        <div class="empty-text">You haven't placed any orders yet. Visit our services page to get started!</div>
                    </div>
                `;
                return;
            }

            ordersList.innerHTML = allOrders.map(order => {
                const platformClass = getPlatformClass(order.platform);
                const statusClass = getStatusClass(order.status);
                const statusText = order.status || 'Pending';
                
                return `
                    <div class="order-item">
                        <div class="order-main">
                            <div class="order-id">${order.orderId}</div>
                            <div class="order-details">
                                <div class="platform-service">
                                    <span class="platform-icon ${platformClass}">
                                        ${getPlatformIcon(order.platform)}
                                    </span>
                                    <span>${order.platform} - ${order.service}</span>
                                </div>
                                <div class="order-meta">
                                    <span>📊 Qty: ${order.quantity}</span>
                                    <span>🔗 ${truncateLink(order.link)}</span>
                                    <span>📅 ${order.date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="order-status-section">
                            <div class="status-badge ${statusClass}">
                                ${statusText}
                            </div>
                            <div class="order-amount">$${order.amount}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Get Platform CSS Class
        function getPlatformClass(platform) {
            if (!platform) return '';
            const p = platform.toLowerCase();
            if (p.includes('youtube')) return 'youtube';
            if (p.includes('instagram')) return 'instagram';
            if (p.includes('facebook')) return 'facebook';
            if (p.includes('twitter')) return 'twitter';
            if (p.includes('tiktok')) return 'tiktok';
            return '';
        }

        // Get Platform Icon
        function getPlatformIcon(platform) {
            if (!platform) return '🌐';
            const p = platform.toLowerCase();
            if (p.includes('youtube')) return '▶️';
            if (p.includes('instagram')) return '📷';
            if (p.includes('facebook')) return 'f';
            if (p.includes('twitter')) return '🐦';
            if (p.includes('tiktok')) return '🎵';
            return '🌐';
        }

        // Get Status CSS Class
        function getStatusClass(status) {
            if (!status) return 'status-pending';
            const s = status.toLowerCase();
            if (s === 'pending') return 'status-pending';
            if (s === 'processing') return 'status-processing';
            if (s === 'completed') return 'status-completed';
            if (s === 'cancelled') return 'status-cancelled';
            return 'status-pending';
        }

        // Truncate long links
        function truncateLink(link) {
            if (!link) return 'N/A';
            if (link.length > 30) {
                return link.substring(0, 30) + '...';
            }
            return link;
        }

        // Update Last Updated Time
        function updateLastUpdated() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdated').textContent = `Last updated: ${timeStr}`;
        }

        // Manual Refresh
        function manualRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            btn.disabled = true;
            
            loadOrders().then(() => {
                setTimeout(() => {
                    btn.classList.remove('spinning');
                    btn.disabled = false;
                }, 500);
            });
        }

        // Auto Refresh every 30 seconds
        function startAutoRefresh() {
            refreshInterval = setInterval(() => {
                loadOrders();
            }, 30000); // 30 seconds
        }

        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        }

        // Logout
        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', stopAutoRefresh);
    </script>
</body>
</html>
