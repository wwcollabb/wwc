<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Worldwide Collab</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #080810;
      --surface:  #0f0f1a;
      --surface2: #161624;
      --surface3: #1c1c2e;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.10);
      --border3:  rgba(255,255,255,0.18);
      --accent:   #6366f1;
      --accent2:  #a78bfa;
      --accent3:  #818cf8;
      --green:    #10b981;
      --green2:   #34d399;
      --red:      #f87171;
      --gold:     #fbbf24;
      --text:     #f1f5f9;
      --text2:    #cbd5e1;
      --muted:    #64748b;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
      color: var(--text);
    }

    /* ── Ambient glow ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(99,102,241,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 90%,  rgba(167,139,250,0.10) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }
    /* Grid texture */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.013) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.013) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--accent); opacity: 0;
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 0.25; }
      90%  { opacity: 0.15; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Card wrapper ── */
    .login-wrapper {
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
      animation: fadeUp 0.65s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Main card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border3);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.75),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 0 70px rgba(99,102,241,0.15);
    }

    /* ── Header ── */
    .card-header {
      padding: 36px 32px 28px;
      background: linear-gradient(160deg, rgba(99,102,241,0.20) 0%, rgba(167,139,250,0.10) 60%, transparent 100%);
      border-bottom: 1px solid var(--border);
      text-align: center;
      position: relative; overflow: hidden;
    }
    .card-header::before {
      content: '';
      position: absolute; top: -70px; right: -70px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(167,139,250,0.18), transparent 70%);
      border-radius: 50%;
    }
    .card-header::after {
      content: '';
      position: absolute; bottom: -50px; left: -50px;
      width: 170px; height: 170px;
      background: radial-gradient(circle, rgba(99,102,241,0.12), transparent 70%);
      border-radius: 50%;
    }

    .logo-wrap {
      position: relative; z-index: 1;
      width: 80px; height: 80px;
      margin: 0 auto 18px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(99,102,241,0.5), 0 0 0 1px rgba(255,255,255,0.1) inset;
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    .logo-wrap:hover { transform: scale(1.07) rotate(-2deg); }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 22px; }
    .logo-wrap .logo-fallback { font-size: 36px; line-height: 1; }

    .brand-name {
      position: relative; z-index: 1;
      font-size: 22px; font-weight: 900;
      letter-spacing: -0.3px; color: var(--text);
    }
    .brand-name span {
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .brand-tagline {
      position: relative; z-index: 1;
      font-size: 10px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 2.5px;
      margin-top: 4px;
    }

    /* ── Form title ── */
    .form-title {
      font-size: 20px; font-weight: 800;
      color: var(--text); text-align: center;
      margin-bottom: 4px; letter-spacing: -0.3px;
      transition: all 0.3s;
    }
    .form-subtitle {
      font-size: 12px; color: var(--muted);
      text-align: center; margin-bottom: 24px;
    }

    /* ── Body ── */
    .card-body { padding: 28px 28px 24px; }

    /* ── Input groups ── */
    .input-group { margin-bottom: 16px; }

    .input-group label {
      display: block;
      font-size: 11px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 7px;
    }

    .input-wrap {
      position: relative; display: flex; align-items: center;
    }
    .input-icon {
      position: absolute; left: 14px;
      color: var(--muted); pointer-events: none;
      display: flex; align-items: center;
      transition: color 0.2s;
    }
    .input-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 13px;
      padding: 13px 16px 13px 42px;
      font-size: 14px; color: var(--text);
      font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    .input-wrap input:focus + .input-icon,
    .input-wrap:focus-within .input-icon { color: var(--accent3); }
    .input-wrap input::placeholder { color: var(--muted); }

    /* Password toggle */
    .pw-toggle {
      position: absolute; right: 14px; cursor: pointer;
      color: var(--muted); display: flex; align-items: center;
      transition: color 0.2s; background: none; border: none; padding: 4px;
    }
    .pw-toggle:hover { color: var(--text2); }
    .input-wrap input[type="password"] { padding-right: 44px; }
    .input-wrap input.has-toggle { padding-right: 44px; }

    /* Name field hidden by default */
    #nameGroup { display: none; }
    #nameGroup.show { display: block; animation: slideDown 0.28s ease both; }

    /* Forgot */
    .forgot-row {
      text-align: right; margin-top: -8px; margin-bottom: 18px;
    }
    .forgot-row a {
      font-size: 12px; color: var(--accent3); text-decoration: none; font-weight: 600;
      transition: color 0.2s;
    }
    .forgot-row a:hover { color: var(--accent2); }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 800;
      color: white; font-family: 'Outfit', sans-serif;
      cursor: pointer; letter-spacing: 0.3px;
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
      transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
      position: relative; overflow: hidden;
    }
    .submit-btn::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0); transition: background 0.2s;
    }
    .submit-btn:hover::after { background: rgba(255,255,255,0.08); }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 40px rgba(99,102,241,0.55); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 9px; }
    .spinner-sm {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Messages ── */
    .msg {
      border-radius: 12px; padding: 11px 14px;
      font-size: 13px; font-weight: 600; line-height: 1.5;
      margin-top: 12px; display: none;
      animation: fadeUp 0.3s ease both;
    }
    .msg.error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: var(--red);
    }
    .msg.success {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.25);
      color: var(--green2);
    }

    /* ── Divider ── */
    .or-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0;
      color: var(--muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border2);
    }

    /* ── Google button ── */
    .google-btn {
      width: 100%; padding: 13px 20px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 14px;
      font-size: 14px; font-weight: 700;
      color: var(--text2); font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.22s ease;
    }
    .google-btn:hover {
      background: var(--surface3);
      border-color: var(--border3);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .google-icon { width: 18px; height: 18px; flex-shrink: 0; }

    /* ── Toggle form ── */
    .toggle-row {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: var(--muted); font-weight: 500;
    }
    .toggle-row a {
      color: var(--accent3); font-weight: 700; cursor: pointer;
      text-decoration: none; margin-left: 4px;
      transition: color 0.2s;
    }
    .toggle-row a:hover { color: var(--accent2); }

    /* ── Secure badge ── */
    .secure-row {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      margin-top: 18px;
      font-size: 11px; color: var(--muted); font-weight: 500;
    }
    .secure-row svg { flex-shrink: 0; }

    /* ── Keyframes ── */
    @keyframes fadeUp   { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: none; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }
    @keyframes spin     { to { transform: rotate(360deg); } }

    @media (max-width: 440px) {
      .card-header { padding: 28px 22px 22px; }
      .card-body   { padding: 22px 20px 20px; }
    }
  </style>
</head>
<body>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<div class="login-wrapper">
  <div class="card">

    <!-- Header -->
    <div class="card-header">
      <div class="logo-wrap" id="logoWrap">
        <img src="logo.png" alt="Worldwide Collab"
             onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block'">
        <span class="logo-fallback" id="logoFallback" style="display:none">🌐</span>
      </div>
      <div class="brand-name">Worldwide <span>Collab</span></div>
      <div class="brand-tagline">Global Talent Platform</div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <div class="form-title" id="formTitle">Welcome Back</div>
      <div class="form-subtitle" id="formSubtitle">Sign in to your account</div>

      <form id="authForm" onsubmit="handleSubmit(event)" autocomplete="on">

        <!-- Name (signup only) -->
        <div class="input-group" id="nameGroup">
          <label>Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" id="displayName" placeholder="Enter your full name" autocomplete="name">
          </div>
        </div>

        <!-- Email -->
        <div class="input-group">
          <label>Email Address</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
            </span>
            <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" class="has-toggle">
            <button type="button" class="pw-toggle" id="pwToggle" onclick="togglePassword()" tabindex="-1">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <div class="forgot-row" id="forgotRow">
          <a href="#" onclick="resetPassword(); return false;">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <div class="btn-inner" id="btnInner">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Login
          </div>
        </button>

        <!-- Messages -->
        <div class="msg error" id="errorDiv"></div>
        <div class="msg success" id="successDiv"></div>

      </form>

      <!-- OR Divider -->
      <div class="or-divider"><span>OR</span></div>

      <!-- Google -->
      <button class="google-btn" onclick="signInWithGoogle()" id="googleBtn">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <!-- Toggle -->
      <div class="toggle-row">
        <span id="toggleText">Don't have an account?</span>
        <a onclick="toggleForm()" id="toggleLink">Sign Up</a>
      </div>

      <!-- Secure -->
      <div class="secure-row">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C16.5 22.15 20 17.25 20 12V6L12 2z"/></svg>
        Secured by Firebase Authentication
      </div>

    </div><!-- /card-body -->
  </div><!-- /card -->
</div><!-- /login-wrapper -->

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
  // ── Firebase Config ──
  const firebaseConfig = {
    apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
    authDomain: "ww-c-5c5c1.firebaseapp.com",
    projectId: "ww-c-5c5c1",
    storageBucket: "ww-c-5c5c1.firebasestorage.app",
    messagingSenderId: "200600278915",
    appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const googleProvider = new firebase.auth.GoogleAuthProvider();

  // ── State ──
  let isLogin = true;
  let pwVisible = false;

  // ── Auth state ──
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'index';
  });

  // ── Toggle Login / Signup ──
  function toggleForm() {
    isLogin = !isLogin;
    clearMessages();

    const nameGroup   = document.getElementById('nameGroup');
    const formTitle   = document.getElementById('formTitle');
    const formSub     = document.getElementById('formSubtitle');
    const submitBtn   = document.getElementById('submitBtn');
    const btnInner    = document.getElementById('btnInner');
    const toggleText  = document.getElementById('toggleText');
    const toggleLink  = document.getElementById('toggleLink');
    const forgotRow   = document.getElementById('forgotRow');

    if (isLogin) {
      formTitle.textContent  = 'Welcome Back';
      formSub.textContent    = 'Sign in to your account';
      btnInner.innerHTML     = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login`;
      toggleText.textContent = "Don't have an account?";
      toggleLink.textContent = 'Sign Up';
      forgotRow.style.display = 'block';
      nameGroup.classList.remove('show');
      setTimeout(() => { nameGroup.style.display = 'none'; }, 300);
    } else {
      formTitle.textContent  = 'Create Account';
      formSub.textContent    = 'Join thousands of creators & brands';
      btnInner.innerHTML     = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Create Account`;
      toggleText.textContent = 'Already have an account?';
      toggleLink.textContent = 'Login';
      forgotRow.style.display = 'none';
      nameGroup.style.display = 'block';
      requestAnimationFrame(() => nameGroup.classList.add('show'));
    }
  }

  // ── Password Visibility ──
  function togglePassword() {
    pwVisible = !pwVisible;
    const inp  = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    inp.type = pwVisible ? 'text' : 'password';
    icon.innerHTML = pwVisible
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }

  // ── Submit ──
  async function handleSubmit(e) {
    e.preventDefault();
    clearMessages();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const name     = document.getElementById('displayName').value.trim();
    const btn      = document.getElementById('submitBtn');
    const btnInner = document.getElementById('btnInner');

    btnInner.innerHTML = `<div class="spinner-sm"></div> Please wait...`;
    btn.disabled = true;

    try {
      if (isLogin) {
        await auth.signInWithEmailAndPassword(email, password);
        showSuccess('✓ Login successful! Redirecting...');
        setTimeout(() => { window.location.href = 'index'; }, 1000);
      } else {
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        if (name) await cred.user.updateProfile({ displayName: name });
        showSuccess('✓ Account created! Redirecting...');
        setTimeout(() => { window.location.href = 'index'; }, 1000);
      }
    } catch (err) {
      showError(getErrorMessage(err.code));
      btnInner.innerHTML = isLogin
        ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>Login`
        : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>Create Account`;
      btn.disabled = false;
    }
  }

  // ── Google Sign In ──
  function signInWithGoogle() {
    clearMessages();
    const btn    = document.getElementById('googleBtn');
    const submit = document.getElementById('submitBtn');
    btn.disabled = true; submit.disabled = true;
    btn.innerHTML = `<div class="spinner-sm" style="border-color:rgba(0,0,0,0.15);border-top-color:var(--accent);"></div> Signing in...`;

    auth.signInWithPopup(googleProvider)
      .then(() => { window.location.href = 'index'; })
      .catch(err => {
        showError(getErrorMessage(err.code));
        btn.disabled = false; submit.disabled = false;
        btn.innerHTML = `<svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>Continue with Google`;
      });
  }

  // ── Reset Password ──
  function resetPassword() {
    const email = document.getElementById('email').value.trim();
    clearMessages();
    if (!email) {
      showError('Please enter your email address first.');
      document.getElementById('email').focus();
      return;
    }
    auth.sendPasswordResetEmail(email)
      .then(() => showSuccess('✓ Reset link sent! Check your inbox.'))
      .catch(err => showError(getErrorMessage(err.code)));
  }

  // ── Helpers ──
  function showError(msg) {
    const el = document.getElementById('errorDiv');
    el.textContent = '✕ ' + msg; el.style.display = 'block';
  }
  function showSuccess(msg) {
    const el = document.getElementById('successDiv');
    el.textContent = msg; el.style.display = 'block';
  }
  function clearMessages() {
    document.getElementById('errorDiv').style.display   = 'none';
    document.getElementById('successDiv').style.display = 'none';
  }

  function getErrorMessage(code) {
    const m = {
      'auth/invalid-email':           'Invalid email address.',
      'auth/user-disabled':           'This account has been disabled.',
      'auth/user-not-found':          'No account found with this email.',
      'auth/wrong-password':          'Incorrect password.',
      'auth/email-already-in-use':    'An account already exists with this email.',
      'auth/weak-password':           'Password should be at least 6 characters.',
      'auth/invalid-credential':      'Invalid email or password.',
      'auth/too-many-requests':       'Too many attempts. Please try again later.',
      'auth/popup-closed-by-user':    'Sign-in popup was closed.',
      'auth/cancelled-popup-request': 'Sign-in cancelled.'
    };
    return m[code] || 'Something went wrong. Please try again.';
  }

  // ── Particles ──
  (function spawnParticles() {
    const container = document.getElementById('particles');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 4 + 2;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        animation-duration: ${Math.random() * 14 + 10}s;
        animation-delay: ${Math.random() * -20}s;
        opacity: 0;
        background: ${Math.random() > 0.5 ? '#6366f1' : '#a78bfa'};
      `;
      container.appendChild(p);
    }
  })();
</script>

</body>
</html>
