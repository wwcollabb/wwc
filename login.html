<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Worldwide Collab</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #0d0d12;
            --surface: #ffffff;
            --card: #f7f6f4;
            --accent: #5b4fff;
            --accent-dark: #3d32cc;
            --accent-light: #ede9ff;
            --muted: #8a8898;
            --border: #e4e2ef;
            --success: #17b26a;
            --error: #f04438;
            --error-bg: #fff1f0;
            --success-bg: #f0fdf4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
        .bg-orb-1 { width: 500px; height: 500px; background: #5b4fff; top: -150px; left: -100px; animation-delay: 0s; }
        .bg-orb-2 { width: 400px; height: 400px; background: #a78bfa; bottom: -100px; right: -80px; animation-delay: 3s; }
        .bg-orb-3 { width: 250px; height: 250px; background: #06b6d4; top: 50%; left: 60%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        .login-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 0 1px var(--border), 0 40px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(24px);
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo-wrap {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: var(--accent-light);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 20px rgba(91, 79, 255, 0.2);
            overflow: hidden;
        }

        .logo-wrap:hover { transform: scale(1.06); box-shadow: 0 8px 30px rgba(91, 79, 255, 0.35); }
        .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
        .logo-fallback { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--accent); letter-spacing: -1px; }

        .brand-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.3px; }
        .brand-tagline { font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 3px; letter-spacing: 1.5px; text-transform: uppercase; }

        .form-header { margin-bottom: 28px; }
        .form-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--ink); letter-spacing: -0.5px; }
        .form-subtitle { font-size: 14px; color: var(--muted); margin-top: 5px; }

        .input-group { margin-bottom: 18px; }

        label { display: block; font-size: 13px; font-weight: 500; color: #3d3a52; margin-bottom: 7px; letter-spacing: 0.1px; }

        .input-wrap { position: relative; display: flex; align-items: center; }

        .input-icon {
            position: absolute;
            left: 14px;
            width: 18px;
            height: 18px;
            color: var(--muted);
            pointer-events: none;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 14.5px;
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            background: #faf9fc;
            transition: all 0.2s ease;
            outline: none;
        }

        input::placeholder { color: #bbb9cc; }

        input:focus {
            border-color: var(--accent);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(91, 79, 255, 0.1);
        }

        .input-wrap:focus-within .input-icon { color: var(--accent); }

        .password-wrap input { padding-right: 44px; }

        .toggle-pw {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            color: var(--muted);
            transition: color 0.2s, background 0.2s;
        }

        .toggle-pw:hover { color: var(--accent); background: var(--accent-light); }
        .toggle-pw svg { width: 18px; height: 18px; }

        .forgot-row { display: flex; justify-content: flex-end; margin-bottom: 22px; margin-top: -8px; }
        .forgot-link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
        .forgot-link:hover { opacity: 0.75; }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(91, 79, 255, 0.35);
        }

        .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(91, 79, 255, 0.45); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 22px 0; color: var(--muted);
            font-size: 12px; font-weight: 500;
            letter-spacing: 0.5px; text-transform: uppercase;
        }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .btn-google {
            width: 100%; padding: 12px; background: #fff; color: var(--ink);
            border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 14.5px; font-family: 'DM Sans', sans-serif; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 10px; transition: all 0.2s ease;
        }
        .btn-google:hover { background: var(--card); border-color: var(--accent); box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

        .toggle-section { margin-top: 22px; text-align: center; font-size: 14px; color: var(--muted); }
        .toggle-link { color: var(--accent); font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity 0.2s; border: none; background: none; font-family: 'DM Sans', sans-serif; font-size: 14px; }
        .toggle-link:hover { opacity: 0.75; text-decoration: underline; }

        .alert { display: none; font-size: 13.5px; margin-top: 14px; padding: 11px 14px; border-radius: 10px; font-weight: 500; align-items: center; gap: 8px; }
        .alert.show { display: flex; }
        .alert-error { color: var(--error); background: var(--error-bg); border: 1px solid rgba(240, 68, 56, 0.15); }
        .alert-success { color: var(--success); background: var(--success-bg); border: 1px solid rgba(23, 178, 106, 0.18); }

        .loading-row { display: none; align-items: center; justify-content: center; gap: 10px; margin-top: 14px; font-size: 13.5px; color: var(--muted); }
        .loading-row.show { display: flex; }

        .spinner { width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 460px) { .login-card { padding: 32px 24px; border-radius: 22px; } .form-title { font-size: 22px; } }
        @media (max-height: 640px) { .login-card { padding: 28px 28px; } .logo-section { margin-bottom: 20px; } .logo-wrap { width: 56px; height: 56px; } .form-header { margin-bottom: 20px; } .input-group { margin-bottom: 14px; } }
    </style>
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>

    <div class="login-card">
        <div class="logo-section">
            <div class="logo-wrap">
                <img src="logo.png" alt="Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <span class="logo-fallback" style="display:none;">W</span>
            </div>
            <div class="brand-name">Worldwide Collab</div>
            <div class="brand-tagline">Global Talent Platform</div>
        </div>

        <div class="form-header">
            <div class="form-title" id="formTitle">Welcome back</div>
            <div class="form-subtitle" id="formSubtitle">Sign in to your account to continue</div>
        </div>

        <form id="authForm" novalidate>
            <div class="input-group">
                <label for="email">Email Address</label>
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
            </div>

            <div class="input-group" id="nameGroup" style="display:none;">
                <label for="displayName">Full Name</label>
                <div class="input-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <input type="text" id="displayName" placeholder="Enter your full name" autocomplete="name">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrap password-wrap">
                    <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword()" title="Toggle password" aria-label="Show or hide password">
                        <!-- Eye open -->
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                        </svg>
                        <!-- Eye closed -->
                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="forgot-row" id="forgotRow">
                <a href="#" class="forgot-link" onclick="resetPassword(); return false;">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>

            <div class="loading-row" id="loadingDiv">
                <div class="spinner"></div>
                <span>Please wait…</span>
            </div>

            <div class="alert alert-error" id="errorDiv">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText"></span>
            </div>
            <div class="alert alert-success" id="successDiv">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="successText"></span>
            </div>
        </form>

        <div class="divider"><span>or</span></div>

        <button class="btn-google" onclick="signInWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="toggle-section">
            <span id="toggleText">Don't have an account? </span>
            <button class="toggle-link" onclick="toggleForm()" id="toggleLink">Sign Up</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
            authDomain: "ww-c-5c5c1.firebaseapp.com",
            projectId: "ww-c-5c5c1",
            storageBucket: "ww-c-5c5c1.firebasestorage.app",
            messagingSenderId: "200600278915",
            appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();

        let isLogin = true;
        let pwVisible = false;

        auth.onAuthStateChanged((user) => {
            if (user) window.location.href = 'index.html';
        });

        function togglePassword() {
            pwVisible = !pwVisible;
            document.getElementById('password').type = pwVisible ? 'text' : 'password';
            document.getElementById('eyeOpen').style.display = pwVisible ? 'none' : 'block';
            document.getElementById('eyeClosed').style.display = pwVisible ? 'block' : 'none';
        }

        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('formTitle').textContent = isLogin ? 'Welcome back' : 'Create account';
            document.getElementById('formSubtitle').textContent = isLogin ? 'Sign in to your account to continue' : 'Join Worldwide Collab today';
            document.getElementById('submitBtn').textContent = isLogin ? 'Sign In' : 'Create Account';
            document.getElementById('toggleText').textContent = isLogin ? "Don't have an account? " : 'Already have an account? ';
            document.getElementById('toggleLink').textContent = isLogin ? 'Sign Up' : 'Sign In';
            document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('forgotRow').style.display = isLogin ? 'flex' : 'none';
            document.getElementById('password').autocomplete = isLogin ? 'current-password' : 'new-password';
            hideAlerts();
        }

        function hideAlerts() {
            document.getElementById('errorDiv').classList.remove('show');
            document.getElementById('successDiv').classList.remove('show');
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorDiv').classList.add('show');
            document.getElementById('successDiv').classList.remove('show');
        }

        function showSuccess(msg) {
            document.getElementById('successText').textContent = msg;
            document.getElementById('successDiv').classList.add('show');
            document.getElementById('errorDiv').classList.remove('show');
        }

        function setLoading(state) {
            document.getElementById('loadingDiv').classList.toggle('show', state);
            document.getElementById('submitBtn').disabled = state;
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const displayName = document.getElementById('displayName').value;

            hideAlerts();
            setLoading(true);

            try {
                if (isLogin) {
                    await auth.signInWithEmailAndPassword(email, password);
                    showSuccess('Login successful! Redirecting…');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else {
                    const cred = await auth.createUserWithEmailAndPassword(email, password);
                    if (displayName) await cred.user.updateProfile({ displayName });
                    showSuccess('Account created! Redirecting…');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                }
            } catch (err) {
                showError(getErrorMessage(err.code));
                setLoading(false);
            }
        });

        function signInWithGoogle() {
            hideAlerts();
            setLoading(true);
            auth.signInWithPopup(googleProvider)
                .then(() => window.location.href = 'index.html')
                .catch(err => { showError(getErrorMessage(err.code)); setLoading(false); });
        }

        function resetPassword() {
            const email = document.getElementById('email').value;
            if (!email) { showError('Please enter your email address first'); return; }
            auth.sendPasswordResetEmail(email)
                .then(() => showSuccess('Password reset email sent! Check your inbox.'))
                .catch(err => showError(getErrorMessage(err.code)));
        }

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'Invalid email address',
                'auth/user-disabled': 'This account has been disabled',
                'auth/user-not-found': 'No account found with this email',
                'auth/wrong-password': 'Incorrect password',
                'auth/email-already-in-use': 'An account already exists with this email',
                'auth/weak-password': 'Password should be at least 6 characters',
                'auth/invalid-credential': 'Invalid email or password',
                'auth/too-many-requests': 'Too many attempts. Please try again later',
                'auth/popup-closed-by-user': 'Sign in popup was closed',
                'auth/cancelled-popup-request': 'Sign in cancelled'
            };
            return messages[code] || 'An error occurred. Please try again.';
        }
    </script>
</body>
</html>
