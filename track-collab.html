<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track My Application — Worldwide Collab</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #070711;
      --surface: #0d0d1a;
      --surface2: #12121f;
      --surface3: #181828;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --border3: rgba(255,255,255,0.15);
      --accent: #6366f1;
      --accent2: #a78bfa;
      --accent3: #818cf8;
      --brand-color: #f43f5e;
      --brand2: #fb7185;
      --creator-color: #667eea;
      --creator2: #a78bfa;
      --green: #10b981;
      --green2: #34d399;
      --yellow: #fbbf24;
      --red: #ef4444;
      --red2: #f87171;
      --text: #f1f5f9;
      --text2: #cbd5e1;
      --muted: #64748b;
      --muted2: #475569;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* Auth overlay */
    #authOverlay {
      position: fixed; inset: 0; background: var(--bg);
      z-index: 9999; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 16px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #authOverlay p { color: var(--muted); font-size: 14px; }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, rgba(99,102,241,0.15) 0%, rgba(13,13,26,0.98) 60%);
      border-bottom: 1px solid var(--border2);
      padding: 0 28px;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(16px);
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center;
      height: 64px; gap: 16px;
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-box {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
      overflow: hidden; flex-shrink: 0;
    }
    .logo-box img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .logo-text { font-size: 15px; font-weight: 800; white-space: nowrap; }
    .logo-text span {
      background: linear-gradient(135deg, var(--accent3), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-spacer { flex: 1; }
    .header-user {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 100px;
      padding: 6px 14px 6px 8px;
    }
    .header-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white;
    }
    .header-email { font-size: 12px; color: var(--text2); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      padding: 7px 16px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red2); }
    .back-home {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; font-weight: 600;
      padding: 7px 14px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; transition: all 0.2s;
    }
    .back-home:hover { color: var(--text2); border-color: var(--border3); }

    /* ── MAIN ── */
    .main {
      max-width: 1200px; margin: 0 auto;
      padding: 32px 24px 60px;
      position: relative; z-index: 1;
    }
    .page-title {
      font-size: 22px; font-weight: 800;
      margin-bottom: 4px;
    }
    .page-subtitle { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* ── STATS BAR ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px; margin-bottom: 24px;
    }
    @media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 400px) { .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; } }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      padding: 18px 20px;
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border3); }
    .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 8px; }
    .stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px; font-weight: 700;
      color: var(--text);
    }
    .stat-card.total .stat-val { color: var(--accent3); }
    .stat-card.pending .stat-val { color: var(--yellow); }
    .stat-card.approved .stat-val { color: var(--green2); }
    .stat-card.rejected .stat-val { color: var(--red2); }

    /* ── TOOLBAR ── */
    .toolbar {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 16px; align-items: center;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 220px;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 10px 14px 10px 38px;
      font-size: 13px; color: var(--text);
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
    }
    .search-input:focus { outline: none; border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* Filter tabs */
    .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-tab {
      padding: 8px 16px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; font-size: 12px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .filter-tab:hover { border-color: var(--border3); color: var(--text2); }
    .filter-tab.active {
      background: rgba(99,102,241,0.15);
      border-color: var(--accent);
      color: var(--accent3);
    }
    .filter-tab.tab-brand.active { background: rgba(244,63,94,0.12); border-color: var(--brand-color); color: var(--brand2); }
    .filter-tab.tab-creator.active { background: rgba(102,126,234,0.12); border-color: var(--creator-color); color: #a5b4fc; }
    .filter-tab.tab-pending.active { background: rgba(251,191,36,0.1); border-color: var(--yellow); color: var(--yellow); }
    .filter-tab.tab-approved.active { background: rgba(16,185,129,0.1); border-color: var(--green); color: var(--green2); }
    .filter-tab.tab-rejected.active { background: rgba(239,68,68,0.1); border-color: var(--red); color: var(--red2); }

    /* Live badge */
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--green2); font-weight: 600;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green2);
      box-shadow: 0 0 0 0 rgba(52,211,153,0.5);
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
      70% { box-shadow: 0 0 0 7px rgba(52,211,153,0); }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 20px;
      overflow: hidden;
    }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 700px; }
    thead th {
      padding: 13px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border2);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: var(--muted); text-align: left;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.025); }
    td {
      padding: 14px 16px;
      font-size: 13px; color: var(--text2);
      vertical-align: middle;
    }
    .td-regid {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--accent3); font-weight: 700;
    }
    .badge-type {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 100px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-brand { background: rgba(244,63,94,0.15); color: var(--brand2); border: 1px solid rgba(244,63,94,0.3); }
    .badge-creator { background: rgba(102,126,234,0.15); color: #a5b4fc; border: 1px solid rgba(102,126,234,0.3); }
    .badge-status {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 100px;
      font-size: 11px; font-weight: 700;
    }
    .status-pending { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.3); }
    .status-approved { background: rgba(16,185,129,0.12); color: var(--green2); border: 1px solid rgba(16,185,129,0.3); }
    .status-rejected { background: rgba(239,68,68,0.12); color: var(--red2); border: 1px solid rgba(239,68,68,0.3); }
    .td-name { font-weight: 600; color: var(--text); }
    .td-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

    /* Empty state */
    .empty-state {
      padding: 60px 20px;
      text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .btn-apply {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: white; text-decoration: none;
      border-radius: 12px; font-size: 14px; font-weight: 700;
      box-shadow: 0 8px 24px rgba(99,102,241,0.3);
      transition: all 0.2s;
    }
    .btn-apply:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(99,102,241,0.45); }

    /* Loading skeleton */
    .skeleton-row td { padding: 18px 16px; }
    .skeleton {
      height: 14px; border-radius: 6px;
      background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

    @media (max-width: 768px) {
      .main { padding: 24px 16px 40px; }
      .header { padding: 0 16px; }
      .header-email { display: none; }
    }
  </style>
</head>
<body>

<div id="authOverlay">
  <div class="spinner"></div>
  <p>Checking authentication...</p>
</div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo-box">
        <img src="logo.png" alt="WWC" onerror="this.style.display='none';this.parentElement.textContent='🌐'">
      </div>
      <div class="logo-text">Worldwide <span>Collab</span></div>
    </div>
    <div class="header-spacer"></div>
    <a href="index.html" class="back-home">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <div class="header-user">
      <div class="header-avatar" id="headerAvatar">?</div>
      <span class="header-email" id="headerEmail">Loading...</span>
    </div>
    <button class="btn-logout" id="btnLogout">Logout</button>
  </div>
</header>

<!-- Main -->
<main class="main">
  <div class="page-title">📋 My Applications</div>
  <div class="page-subtitle">Track your Brand & Creator registration status in real-time</div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card total">
      <div class="stat-label">Total Applied</div>
      <div class="stat-val" id="statTotal">—</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-label">Pending</div>
      <div class="stat-val" id="statPending">—</div>
    </div>
    <div class="stat-card approved">
      <div class="stat-label">Approved</div>
      <div class="stat-val" id="statApproved">—</div>
    </div>
    <div class="stat-card rejected">
      <div class="stat-label">Rejected</div>
      <div class="stat-val" id="statRejected">—</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by Reg ID, Name...">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all">All</button>
      <button class="filter-tab tab-brand" data-filter="brand">🏢 Brand</button>
      <button class="filter-tab tab-creator" data-filter="creator">🎨 Creator</button>
      <button class="filter-tab tab-pending" data-filter="pending">⏳ Pending</button>
      <button class="filter-tab tab-approved" data-filter="approved">✅ Approved</button>
      <button class="filter-tab tab-rejected" data-filter="rejected">❌ Rejected</button>
    </div>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Reg ID</th>
            <th>Type</th>
            <th>Name</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Niche</th>
            <th>Applied</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- skeleton rows -->
          <tr class="skeleton-row"><td><div class="skeleton" style="width:110px"></div></td><td><div class="skeleton" style="width:60px"></div></td><td><div class="skeleton" style="width:130px"></div></td><td><div class="skeleton" style="width:160px"></div></td><td><div class="skeleton" style="width:120px"></div></td><td><div class="skeleton" style="width:80px"></div></td><td><div class="skeleton" style="width:90px"></div></td><td><div class="skeleton" style="width:80px"></div></td></tr>
          <tr class="skeleton-row"><td><div class="skeleton" style="width:110px"></div></td><td><div class="skeleton" style="width:60px"></div></td><td><div class="skeleton" style="width:130px"></div></td><td><div class="skeleton" style="width:160px"></div></td><td><div class="skeleton" style="width:120px"></div></td><td><div class="skeleton" style="width:80px"></div></td><td><div class="skeleton" style="width:90px"></div></td><td><div class="skeleton" style="width:80px"></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Firebase v9 Compat SDK (matches tracking.html / admin.html) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDcvUZkjQYvUFMmS2FC8k0E9XKNXuzPA4k",
    authDomain: "ww-c-5c5c1.firebaseapp.com",
    projectId: "ww-c-5c5c1",
    storageBucket: "ww-c-5c5c1.firebasestorage.app",
    messagingSenderId: "200600278915",
    appId: "1:200600278915:web:654a42ec7f71e9386e08b6"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let allRegistrations = [];
  let activeFilter = 'all';
  let searchTerm = '';

  // Auth check
  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = 'login.html'; return; }

    document.getElementById('authOverlay').style.display = 'none';

    var email = user.email || '';
    document.getElementById('headerEmail').textContent = email;
    var initial = (user.displayName || email || '?')[0].toUpperCase();
    document.getElementById('headerAvatar').textContent = initial;

    // Real-time listener — NO orderBy (no index needed), sort client-side
    db.collection('registrations')
      .where('userId', '==', user.uid)
      .onSnapshot(function(snapshot) {
        allRegistrations = snapshot.docs.map(function(doc) {
          return Object.assign({ id: doc.id }, doc.data());
        });

        // Client-side sort: newest first
        allRegistrations.sort(function(a, b) {
          var tsA = a.createdAt && a.createdAt.toDate ? a.createdAt.toDate().getTime() : 0;
          var tsB = b.createdAt && b.createdAt.toDate ? b.createdAt.toDate().getTime() : 0;
          return tsB - tsA;
        });

        updateStats();
        renderTable();
      }, function(err) {
        console.error('Snapshot error:', err);
        renderEmpty();
      });

    // Logout
    document.getElementById('btnLogout').addEventListener('click', function() {
      auth.signOut().then(function() { window.location.href = 'login.html'; });
    });
  });

  function updateStats() {
    var total    = allRegistrations.length;
    var pending  = allRegistrations.filter(function(r) { return r.status === 'Pending';  }).length;
    var approved = allRegistrations.filter(function(r) { return r.status === 'Approved'; }).length;
    var rejected = allRegistrations.filter(function(r) { return r.status === 'Rejected'; }).length;
    document.getElementById('statTotal').textContent    = total;
    document.getElementById('statPending').textContent  = pending;
    document.getElementById('statApproved').textContent = approved;
    document.getElementById('statRejected').textContent = rejected;
  }

  function getFiltered() {
    return allRegistrations.filter(function(r) {
      var name = r.brandName || r.fullName || '';
      var matchSearch = !searchTerm ||
        (r.regId  || '').toLowerCase().includes(searchTerm) ||
        name.toLowerCase().includes(searchTerm) ||
        (r.email  || '').toLowerCase().includes(searchTerm);
      var matchFilter = activeFilter === 'all' ||
        (activeFilter === 'brand'    && r.type   === 'brand')    ||
        (activeFilter === 'creator'  && r.type   === 'creator')  ||
        (activeFilter === 'pending'  && r.status === 'Pending')  ||
        (activeFilter === 'approved' && r.status === 'Approved') ||
        (activeFilter === 'rejected' && r.status === 'Rejected');
      return matchSearch && matchFilter;
    });
  }

  function formatDate(ts) {
    if (!ts) return '—';
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderTable() {
    var tbody    = document.getElementById('tableBody');
    var filtered = getFiltered();

    if (filtered.length === 0) { renderEmpty(); return; }

    tbody.innerHTML = filtered.map(function(r) {
      var name        = r.brandName || r.fullName || '—';
      var niche       = r.niche || '—';
      var status      = r.status || 'Pending';
      var statusClass = status.toLowerCase();
      var statusEmoji = status === 'Approved' ? '✅' : status === 'Rejected' ? '❌' : '⏳';
      var typeLabel   = r.type === 'brand' ? '🏢 Brand' : '🎨 Creator';
      return '<tr>' +
        '<td class="td-regid">'  + escHtml(r.regId || '—') + '</td>' +
        '<td><span class="badge-type badge-' + (r.type || 'brand') + '">' + typeLabel + '</span></td>' +
        '<td class="td-name">'   + escHtml(name)  + '</td>' +
        '<td>'                   + escHtml(r.email   || '—') + '</td>' +
        '<td>'                   + escHtml(r.whatsapp || '—') + '</td>' +
        '<td>'                   + escHtml(niche) + '</td>' +
        '<td class="td-date">'   + formatDate(r.createdAt) + '</td>' +
        '<td><span class="badge-status status-' + statusClass + '">' + statusEmoji + ' ' + status + '</span></td>' +
        '</tr>';
    }).join('');
  }

  function renderEmpty() {
    var hasAny = allRegistrations.length > 0;
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="8">' +
        '<div class="empty-state">' +
          '<div class="empty-icon">' + (hasAny ? '🔍' : '📋') + '</div>' +
          '<h3>' + (hasAny ? 'No matching applications' : 'No applications yet') + '</h3>' +
          '<p>' + (hasAny ? 'Try adjusting your search or filter.' : "You haven't registered as a Brand or Creator yet.") + '</p>' +
          (!hasAny ? '<a href="register.html" class="btn-apply">✨ Apply Now — Free</a>' : '') +
        '</div>' +
      '</td></tr>';
  }

  // Search
  document.getElementById('searchInput').addEventListener('input', function(e) {
    searchTerm = e.target.value.trim().toLowerCase();
    renderTable();
  });

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
      tab.classList.add('active');
      activeFilter = tab.dataset.filter;
      renderTable();
    });
  });
</script>

</body>
</html>
