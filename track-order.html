<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order – KashRun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--primary:#FF6B00;--primary-dark:#e55d00;--dark:#0F172A;--white:#fff;--gray-50:#F8FAFC;--gray-100:#F1F5F9;--gray-200:#E2E8F0;--gray-400:#94A3B8;--gray-600:#475569;--radius:14px;--shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);--shadow-lg:0 8px 32px rgba(0,0,0,.15)}
  body{font-family:'Inter',sans-serif;background:var(--gray-50);color:var(--dark);min-height:100vh}
  .navbar{background:#fff;border-bottom:1px solid var(--gray-200);padding:0 5%;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
  .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
  .nav-logo img{height:34px}
  .nav-logo span{font-weight:800;font-size:1.15rem;color:var(--primary)}
  .back-btn{color:var(--gray-600);text-decoration:none;font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:4px;transition:color .2s}
  .back-btn:hover{color:var(--primary)}
  .page{max-width:720px;margin:0 auto;padding:48px 5%}
  .page-header{text-align:center;margin-bottom:40px}
  .page-header h1{font-size:2rem;font-weight:800;margin-bottom:8px}
  .page-header p{color:var(--gray-600);font-size:.95rem}
  .search-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:28px;margin-bottom:28px}
  .search-card h3{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--dark)}
  .tabs{display:flex;gap:0;margin-bottom:20px;border:2px solid var(--gray-200);border-radius:50px;overflow:hidden;width:fit-content}
  .tab{padding:9px 22px;cursor:pointer;font-size:.88rem;font-weight:600;transition:.2s;background:transparent;border:none;color:var(--gray-600);font-family:'Inter',sans-serif}
  .tab.active{background:var(--primary);color:#fff}
  .input-row{display:flex;gap:12px;flex-wrap:wrap}
  .input-row input{flex:1;min-width:180px;padding:12px 16px;border:2px solid var(--gray-200);border-radius:50px;font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border .2s}
  .input-row input:focus{border-color:var(--primary)}
  .track-btn{background:var(--primary);color:#fff;border:none;border-radius:50px;padding:12px 28px;font-size:.95rem;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
  .track-btn:hover{background:var(--primary-dark)}
  /* LOADER */
  .loader{display:none;text-align:center;padding:40px}
  .spinner{width:36px;height:36px;border:4px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* RESULTS */
  #results{display:none}
  .order-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:24px;margin-bottom:20px;border-left:4px solid var(--primary)}
  .order-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:16px}
  .order-id{font-size:1.1rem;font-weight:800}
  .order-date{font-size:.8rem;color:var(--gray-400);margin-top:3px}
  .order-amount{font-size:1.1rem;font-weight:800;color:var(--primary)}
  .items-section{margin-bottom:20px}
  .items-section h4{font-size:.82rem;font-weight:700;color:var(--gray-600);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--gray-100);font-size:.88rem}
  .item-row:last-child{border-bottom:none}
  .item-name{font-weight:600}
  .item-size{color:var(--gray-400);font-size:.78rem;margin-left:4px}
  .item-price{font-weight:700;color:var(--dark)}
  /* TIMELINE */
  .timeline{position:relative;padding-left:28px}
  .timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:var(--gray-200)}
  .timeline-step{position:relative;margin-bottom:20px;display:flex;align-items:flex-start;gap:14px}
  .timeline-step:last-child{margin-bottom:0}
  .step-dot{width:20px;height:20px;border-radius:50%;border:3px solid var(--gray-200);background:#fff;flex-shrink:0;margin-left:-31px;margin-top:1px;position:relative;z-index:1;transition:.3s}
  .step-dot.done{background:var(--primary);border-color:var(--primary)}
  .step-dot.current{background:#fff;border-color:var(--primary);box-shadow:0 0 0 4px rgba(255,107,0,.2)}
  .step-dot.cancelled{background:#EF4444;border-color:#EF4444}
  .step-info .step-name{font-weight:700;font-size:.9rem;color:var(--gray-400)}
  .step-info .step-name.done,.step-info .step-name.current{color:var(--dark)}
  .step-info .step-name.cancelled{color:#EF4444}
  .step-info .step-desc{font-size:.78rem;color:var(--gray-400);margin-top:2px}
  /* EMPTY / ERROR */
  .empty-state{text-align:center;padding:60px 20px}
  .empty-state .icon{font-size:3.5rem;margin-bottom:16px}
  .empty-state h3{font-size:1.2rem;font-weight:700;margin-bottom:8px}
  .empty-state p{color:var(--gray-400);font-size:.9rem}
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:50px;font-size:.88rem;font-weight:600;z-index:9999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:480px){.order-header{flex-direction:column}.tabs{width:100%}.tab{flex:1;text-align:center}}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="KashRun" onerror="this.style.display='none'">
    <span>KashRun</span>
  </a>
  <a href="index.html" class="back-btn">← Home</a>
</nav>

<div class="page">
  <div class="page-header">
    <h1>📍 Track Your Order</h1>
    <p>Enter your Order ID or Phone Number to see live status</p>
  </div>

  <div class="search-card">
    <div class="tabs">
      <button class="tab active" id="tabId" onclick="switchTab('id')">Order ID</button>
      <button class="tab" id="tabPhone" onclick="switchTab('phone')">Phone Number</button>
    </div>
    <div class="input-row">
      <input type="text" id="trackInput" placeholder="e.g. KR1000" onkeydown="if(event.key==='Enter')trackOrder()">
      <button class="track-btn" onclick="trackOrder()">Track →</button>
    </div>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p style="color:var(--gray-400);font-size:.9rem">Looking up your order...</p>
  </div>

  <div id="results"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyDvViMeJbOdLvNT1163vlp7fPIXK6qJ8Qk",authDomain:"kashrun-6ac6a.firebaseapp.com",projectId:"kashrun-6ac6a",storageBucket:"kashrun-6ac6a.firebasestorage.app",messagingSenderId:"466142826836",appId:"1:466142826836:web:8fbcd0a829d582429ff8c1"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let trackMode='id';
window.switchTab=(mode)=>{
  trackMode=mode;
  document.getElementById('tabId').classList.toggle('active',mode==='id');
  document.getElementById('tabPhone').classList.toggle('active',mode==='phone');
  const inp=document.getElementById('trackInput');
  inp.placeholder=mode==='id'?'e.g. KR1000':'10-digit phone number';
  inp.value='';
  document.getElementById('results').style.display='none';
};

const STEPS=[
  {key:'Pending',label:'Order Placed',desc:'Your order has been received.'},
  {key:'Confirmed',label:'Confirmed',desc:'Restaurant has confirmed your order.'},
  {key:'Preparing',label:'Being Prepared',desc:'Your food is being freshly made.'},
  {key:'Out For Delivery',label:'Out for Delivery',desc:'Our rider is on the way!'},
  {key:'Delivered',label:'Delivered',desc:'Enjoy your meal! 🎉'},
];
const CANCELLED={key:'Cancelled',label:'Cancelled',desc:'This order was cancelled.'};

function stepIndex(status){
  const i=STEPS.findIndex(s=>s.key===status);
  return i===-1?-99:i;
}

function renderTimeline(status){
  if(status==='Cancelled'){
    return `<div class="timeline">
      ${STEPS.map((s,i)=>`<div class="timeline-step">
        <div class="step-dot"></div>
        <div class="step-info"><div class="step-name">${s.label}</div></div>
      </div>`).join('')}
      <div class="timeline-step">
        <div class="step-dot cancelled"></div>
        <div class="step-info"><div class="step-name cancelled">${CANCELLED.label}</div><div class="step-desc">${CANCELLED.desc}</div></div>
      </div>
    </div>`;
  }
  const cur=stepIndex(status);
  return `<div class="timeline">${STEPS.map((s,i)=>{
    const cls=i<cur?'done':i===cur?'current':'';
    return `<div class="timeline-step">
      <div class="step-dot ${cls}"></div>
      <div class="step-info">
        <div class="step-name ${cls}">${s.label}</div>
        ${i===cur?`<div class="step-desc">${s.desc}</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderOrder(o){
  const date=o.createdAt?new Date(o.createdAt).toLocaleString('en-IN',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const items=(o.items||[]).map(i=>`<div class="item-row">
    <span><span class="item-name">${i.name}</span>${i.selectedSize?`<span class="item-size">(${i.selectedSize})</span>`:''} ×${i.quantity}</span>
    <span class="item-price">₹${i.price*i.quantity}</span>
  </div>`).join('');
  return `<div class="order-card">
    <div class="order-header">
      <div><div class="order-id">${o.orderId||'—'}</div><div class="order-date">${date}</div></div>
      <div class="order-amount">₹${o.totalAmount||0}</div>
    </div>
    <div class="items-section">
      <h4>Items Ordered</h4>${items}
    </div>
    <div class="items-section">
      <h4>Delivery Status</h4>
      ${renderTimeline(o.status||'Pending')}
    </div>
  </div>`;
}

window.trackOrder=async()=>{
  const val=document.getElementById('trackInput').value.trim();
  if(!val){showToast('Please enter '+(trackMode==='id'?'Order ID':'Phone Number'));return;}
  document.getElementById('loader').style.display='block';
  document.getElementById('results').style.display='none';
  try{
    let orders=[];
    if(trackMode==='id'){
      const q=query(collection(db,'orders'),where('orderId','==',val.toUpperCase()));
      const snap=await getDocs(q);
      snap.forEach(d=>orders.push(d.data()));
    }else{
      const q=query(collection(db,'orders'),where('phoneNumber','==',val));
      const snap=await getDocs(q);
      snap.forEach(d=>orders.push(d.data()));
      orders.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
    }
    document.getElementById('loader').style.display='none';
    const res=document.getElementById('results');res.style.display='block';
    if(!orders.length){
      res.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><h3>No orders found.</h3><p>Double-check your ${trackMode==='id'?'Order ID':'phone number'} and try again.</p></div>`;
    }else{
      res.innerHTML=orders.map(renderOrder).join('');
    }
  }catch(e){
    document.getElementById('loader').style.display='none';
    showToast('Error fetching order. Please try again.');console.error(e);
  }
};

let toastTimer;
window.showToast=(msg)=>{
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);
};

// Auto-track from URL param
const params=new URLSearchParams(window.location.search);
const pid=params.get('orderId');
if(pid){document.getElementById('trackInput').value=pid;trackOrder();}
</script>
</body>
</html>
